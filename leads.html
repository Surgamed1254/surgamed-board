function midnight(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function rotationOffset(target){
  const a=midnight(ANCHOR), t=midnight(target);
  if(a.getTime()===t.getTime()) return 0;
  let step=t.getTime()>a.getTime()?1:-1, d=0; const cur=new Date(a);
  while(cur.getTime()!==t.getTime()){ cur.setDate(cur.getDate()+step); const w=cur.getDay(); if(w!==0&&w!==6) d+=step; }
  return d;
}
function repForCat(catKey,date){ let ci=0; CATS.forEach((c,i)=>{ if(c.key===catKey) ci=i; }); const d=rotationOffset(date); return REPS[(((ci-d)%4)+4)%4]; }
// Effective "owning business day" for a timestamp, evaluated in US Eastern:
//  - handoff at 6 PM ET (after 6 PM rolls to the next business day's rep)
//  - Sat/Sun (and Friday after 6 PM) roll forward to Monday's rep
function effDate(d){
  const f=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',hourCycle:'h23'});
  const o={}; f.formatToParts(new Date(d)).forEach(p=>{ o[p.type]=p.value; });
  let x=new Date(Number(o.year), Number(o.month)-1, Number(o.day), 12, 0, 0);
  if(Number(o.hour)>=18) x.setDate(x.getDate()+1);
  while(x.getDay()===0||x.getDay()===6) x.setDate(x.getDate()+1);
  return x;
}
function businessRef(){ return effDate(new Date()); }
// Build the ms timestamp for hour:00 ET on a given Y-M-D (DST-safe).
function etInstant(y,m,d,hour){
  for(const off of [4,5]){
    const t=Date.UTC(y,m-1,d,hour+off,0,0);
    const h=Number(new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'2-digit',hourCycle:'h23'}).format(new Date(t)));
    if(h===hour) return t;
  }
  return Date.UTC(y,m-1,d,hour+4,0,0);
}
// Start of the current rotation window = the 6 PM ET handoff that began today's shift
// (reaches back through the weekend on Mondays, matching who owns those leads).
function rotationStartMs(){
  const D=effDate(new Date());
  const prev=new Date(D); prev.setDate(prev.getDate()-1);
  while(prev.getDay()===0||prev.getDay()===6) prev.setDate(prev.getDate()-1);
  return etInstant(prev.getFullYear(), prev.getMonth()+1, prev.getDate(), 18);
}

function titleCase(s){ return (s||"").replace(/\b\w/g,c=>c.toUpperCase()); }
function senderName(s){ if(!s) return ""; const m=/^([^<]+)</.exec(s); if(m) return m[1].trim().replace(/^"|"$/g,""); if(/@/.test(s)) return s.split("@")[0].replace(/[._]/g," "); return s; }
function senderEmail(s){ const m=/<([^>]+)>/.exec(s||""); if(m) return m[1]; return (s||"").trim(); }
function isAuto(s){ return /auto@dotmed\.com/i.test(s||""); }
function normSubject(s){ return (s||"").replace(/^\s*((re|fw|fwd)\s*:\s*)+/i,"").replace(/\[external\]/ig,"").replace(/\s+/g," ").trim(); }
function ourAddr(e){ return /surgamed\.com|shortdatedsurgical\.com|dotmed/i.test(e||""); }
function fmtDate(d){ const dt=new Date(d),n=new Date(),o={month:"short",day:"numeric"}; if(dt.getFullYear()!==n.getFullYear())o.year="numeric"; return dt.toLocaleDateString(undefined,o); }
function statusObj(k){ return STATUSES.find(s=>s.key===k)||STATUSES[0]; }
const KNOWN_CATS = new Set();
const STATUS_LABELS = STATUSES.map(s=>s.label);
async function freshToken(){ try{ const { data:{ session } }=await sb.auth.getSession(); if(session) TOKEN=session.access_token; }catch(e){} return TOKEN; }
async function writeCats(lead, cats){
  const set=[...new Set((cats||[]).map(c=>String(c).trim()).filter(Boolean))].slice(0,25);
  try{
    const r=await fetch(FN_URL,{method:"POST",headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY,"content-type":"application/json"},body:JSON.stringify({id:lead.uri,categories:set})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok){ alert("Couldn't save tags to Outlook: "+(j.error||("HTTP "+r.status))); return false; }
    lead.cats=Array.isArray(j.categories)?j.categories:set; lead.cats.forEach(c=>KNOWN_CATS.add(c)); return true;
  }catch(e){ alert("Couldn't save tags: "+e); return false; }
}
function renderTags(l){

  else h+='<span style="color:#9aa7b4;font-size:12px">No tags on this email</span>';
  h+='</div>';
  const sugg=[...new Set([...KNOWN_CATS, ...REPS, ...STATUS_LABELS])].filter(c=>!cur.includes(c));
  if(sugg.length){ h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">'; sugg.forEach(c=>{ h+='<span class="tag" style="background:#f0f3f6;color:#42505e;cursor:pointer" data-add="'+esc(c)+'">+ '+esc(c)+'</span>'; }); h+='</div>'; }
  h+='<div style="display:flex;gap:6px"><input id="tagIn" placeholder="New tag…" style="flex:1;padding:6px 8px;border:1px solid #cdd6df;border-radius:7px;font-size:12.5px"><button id="tagAdd" style="padding:6px 12px;border:1px solid #d7dee6;border-radius:7px;background:#f7f9fb;font-weight:600;cursor:pointer">Add</button></div>';

  box.querySelectorAll("[data-add]").forEach(el=>{ el.onclick=async()=>{ el.style.opacity=.5; await writeCats(l,[...(l.cats||[]),el.getAttribute("data-add")]); renderTags(l); renderBoard(); }; });
  const ta=document.getElementById("tagAdd"), ti=document.getElementById("tagIn");
  ta.onclick=async()=>{ const v=ti.value.trim(); if(!v)return; ta.disabled=true; await writeCats(l,[...(l.cats||[]),v]); ti.value=""; renderTags(l); renderBoard(); };
  ti.addEventListener("keydown",e=>{ if(e.key==="Enter") ta.onclick(); });
}

function isNoise(email){
  const s=(email.subject||"").toLowerCase(), snd=(email.sender||"").toLowerCase();
  if(/dotmed-mail\.com|cloud-protect\.net|mailer-daemon|postmaster|@facebookmail|linkedin\.com|github\.com|indeed\.com|upwork\.com|godaddy|paypal\.com|anthropic\.com|intuit|quickbooks|stripe\.com|squareup|@amazon|billing@/.test(snd)) return true;
  if(/(no-?reply|do-not-reply|noreply)/.test(snd) && !isAuto(snd)) return true;
  if(/listing download|parts alerts|equipment.*alert|forums|quarantine|daily digest|expiring|reminder|out of office|undeliverable|automatic reply|^read:|^not read:|receipt|your invoice|updated your invoice|we sent your invoice|invoice #|payment received/.test(s)) return true;
  return false;
}
function isInquiry(email){
  if(isNoise(email)) return false;
  const snd=(email.sender||"").toLowerCase();
  if(isAuto(snd)) return /sent you this email regarding/i.test(email.summary||"");
  if(ourAddr(snd)) return false;
  return true;
}
function firstCustomerEmail(s){ const re=/([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})/g; let m; while((m=re.exec(s))){ if(!ourAddr(m[1])) return m[1]; } return ""; }
function firstPhone(s){ let m=/(\+\d[\d\s().\-]{6,}\d)/.exec(s); if(m) return m[1].replace(/[^\d+]/g,""); m=/\b(\d{3}[\s.\-]\d{3}[\s.\-]\d{4})\b/.exec(s); if(m) return m[1].replace(/[^\d]/g,""); return ""; }

function extractLead(email,catKey){
  const s=email.summary||"", subj=email.subject||"", blob=subj+" — "+s;
  let listing=""; const mL=/Listing\s*#?\s*(\d{4,})/i.exec(blob); if(mL) listing=mL[1];
  const real=!isAuto(email.sender);
  let custName="",company="",custEmail="",phone="",deal="",extra="",item="";
  if(real){ custName=senderName(email.sender); custEmail=senderEmail(email.sender); }
  const mE=/Email:\s*([^\s,;<>]+@[^\s,;<>]+)/i.exec(s); if(!custEmail && mE) custEmail=mE[1];
  if(catKey==="offers"){
    const mo=/made by\s+(.+?)\s+of\s+(.+?)\s+in\s+/i.exec(s); if(mo){ if(!custName)custName=mo[1].trim(); company=mo[2].trim(); }
    const lp=/Listing Price:\s*\$?([\d.,]+)/i.exec(s), op=/Offer Price:\s*\$?([\d.,]+)/i.exec(s);
    if(lp&&op) deal="List $"+lp[1]+" → Offer $"+op[1];
    const io=/for Listing\s*#?\d+,\s*(.+?),\s*was made by/i.exec(s); if(io) item=io[1].trim();
  } else if(catKey==="quotes"){
    const mc=/Ship To Country:\s*(.+)/i.exec(s); if(mc) extra="Ship to "+mc[1].trim();
    if(!custEmail) custEmail=firstCustomerEmail(s);
    const qi=/Listing\s*#?\d+\s*[-–]\s*(.+?)[\r\n]/i.exec(s); if(qi) item=qi[1].trim();
  } else if(catKey==="inquiries"){
    if(isAuto(email.sender)){
      const mi=/([A-Za-z][\w .'\-]+?)\s+of\s+(.+?)\s+sent you this email/i.exec(s);
      if(mi){ custName=mi[1].trim(); company=mi[2].trim(); }
      else { const m2=/^\s*([A-Za-z][\w .'\-]+?)\s+sent you this email/i.exec(s); if(m2) custName=m2[1].trim(); }
      custEmail=firstCustomerEmail(s); phone=firstPhone(s);
      const ii=/regarding Listing\s*#?\d+,\s*(.+?)\.(?:\s|$|\r|\n)/i.exec(s); if(ii) item=ii[1].trim();
    } else item=normSubject(subj);
  }
  let display=custName||company;
  if(!display) display = custEmail ? custEmail.split("@")[0] : (listing?("Listing #"+listing):"dotMed lead");
  if(company && custName && company.toLowerCase()!==custName.toLowerCase()) display=custName+" · "+company;
  let title;
  if(catKey==="orders") title="Order placed"+(listing?" · #"+listing:"");
  else if(catKey==="offers") title="Offer"+(listing?" · #"+listing:"");
  else if(catKey==="quotes") title="Shipping quote"+(listing?" · #"+listing:"")+(extra?" · "+extra:"");
  else title = isAuto(email.sender) ? ("Inquiry"+(listing?" · #"+listing:"")) : normSubject(subj);
  const who=custEmail||custName||company||"";
  let gkey;
  if(listing) gkey=catKey+":L"+listing+"|"+who.toLowerCase();
  else if(who) gkey=catKey+":"+normSubject(subj).toLowerCase()+"|"+who.toLowerCase();
  else gkey=catKey+":id:"+(email.id||Math.random());
  return {listing,custName,company,custEmail,phone,deal,item,display,title,gkey};
}
function acctLabel(email){ const r=(email.recipients&&email.recipients.join(" "))||""; return /shortdated/i.test(r)?{t:"ShortDated",sd:true}:{t:"SurgaMed",sd:false}; }

async function loadState(){
  const { data, error } = await sb.from("lead_state").select("*");
  STATE = {};
  if(!error && data) data.forEach(r=>{ STATE[r.id]=r; });
}
async function upsertState(id, patch){
  STATE[id] = Object.assign({ id }, STATE[id]||{}, patch, { updated_at:new Date().toISOString(), updated_by:ME });
  await sb.from("lead_state").upsert(STATE[id]);
}
async function addHistory(id, action){
  await sb.from("lead_history").insert({ lead_id:id, actor:ME, action });
}
function st(id){ return STATE[id]||{}; }
function effRep(l){ const s=st(l.id); return s.assignee||s.owner||repForCat(l.cat,effDate(new Date(l.date))); }
function effStatus(l){ return st(l.id).status||"new"; }
async function applyRep(l, val){
  const prev=st(l.id).assignee||st(l.id).owner||"";
  if(val===prev) return;
  await upsertState(l.id,{assignee:val});
  await addHistory(l.id,"Passed from "+(prev||"?")+" → "+val);
}
async function applyStatus(l, val){
  const ps=st(l.id).status||"new";
  if(val===ps) return;
  await upsertState(l.id,{status:val});
  await addHistory(l.id,"Status: "+statusObj(ps).label+" → "+statusObj(val).label);
}

const CHAN_LABEL={ email:"✉️ Emailed", phone:"📞 Called", whatsapp:"💬 WhatsApp", note:"📝 Note" };
async function getContacts(email){
  if(!email) return [];
  const { data } = await sb.from("contacts").select("*").eq("customer_email",String(email).toLowerCase()).order("created_at",{ascending:false}).limit(200);
  return data||[];
}
// Record that the signed-in rep made contact with this lead's customer.
async function logContact(l, channel, note){
  if(!l) return;
  const email=(l.custEmail||"").toLowerCase();
  if(!email && !note) return;
  const rep = (REPS.includes(MY_REP)?MY_REP:"") || effRep(l) || ME;
  try{
    await sb.from("contacts").insert({
      customer_email: email||null, customer_name: l.display||l.custName||null,
      rep, rep_email: MY_EMAIL||null, channel, lead_id: l.id, listing: l.listing||null, note: note||null
    });
    if(email){ const cur=CONTACTS_BY_EMAIL[email]||{rep, count:0}; CONTACTS_BY_EMAIL[email]={rep:cur.rep||rep, count:(cur.count||0)+1}; }
  }catch(e){ /* non-fatal */ }
}
// Which rep "owns the relationship" for a set of contact rows: most contacts, earliest wins ties.
function primaryRep(rows){
  const cnt={}, first={};
  (rows||[]).forEach(r=>{ if(!r.rep) return; cnt[r.rep]=(cnt[r.rep]||0)+1; if(!first[r.rep]||r.created_at<first[r.rep]) first[r.rep]=r.created_at; });
  const reps=Object.keys(cnt); if(!reps.length) return null;
  reps.sort((a,b)=>(cnt[b]-cnt[a])||(first[a]<first[b]?-1:1));
  return reps[0];
}
function renderContacts(rows, l){
  if(!rows||!rows.length) return '<div style="color:#9aa7b4;font-size:12px">No rep has logged contact with this customer yet.</div>';
  const pr=primaryRep(rows);
  let h='';
  if(pr){ h+='<div class="relbox">🤝 Relationship: <b>'+esc(pr)+'</b> already deals with this customer — keep it with '+esc(pr)+'. <span style="color:#5a6b7b">('+rows.length+' contact'+(rows.length===1?'':'s')+' on record)</span></div>'; }
  h+='<table class="phtab"><thead><tr><th>When</th><th>Rep</th><th>Channel</th><th>Note</th></tr></thead><tbody>';
  rows.forEach(r=>{ const d=new Date(r.created_at), ds=isNaN(d.getTime())?(r.created_at||''):d.toLocaleString(undefined,{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
    h+='<tr><td class="nowrap">'+esc(ds)+'</td><td><b>'+esc(r.rep||'—')+'</b></td><td>'+esc((CHAN_LABEL[r.channel]||r.channel||''))+'</td><td>'+esc(r.note||'')+'</td></tr>'; });
  h+='</tbody></table>';
  return h;
}
async function loadContacts(l){
  const box=document.getElementById("contactBox"); if(!box) return;

  catch(e){ box.innerHTML='<div style="color:#c0392b;font-size:12px">Couldn’t load contact history: '+esc(String(e.message||e))+'</div>'; }
}
// Build the customer→primary-rep map and auto-assign matching leads to that rep
// (so repeat customers stay with the rep who already deals with them).
async function applyContactOwnership(){
  CONTACTS_BY_EMAIL={};
  const emails=[...new Set(LEADS.map(l=>(l.custEmail||'').toLowerCase()).filter(Boolean))];
  if(!emails.length) return;
  let rows=[];
  try{
    for(let i=0;i<emails.length;i+=80){
      const chunk=emails.slice(i,i+80);
      const { data } = await sb.from('contacts').select('customer_email,rep,created_at').not('message_id','is',null).in('customer_email',chunk);
      rows=rows.concat(data||[]);
    }
  }catch(e){ return; }
  const byEmail={};
  rows.forEach(r=>{ const e=(r.customer_email||'').toLowerCase(); if(!e) return; (byEmail[e]=byEmail[e]||[]).push(r); });
  Object.keys(byEmail).forEach(e=>{ const pr=primaryRep(byEmail[e]); if(pr) CONTACTS_BY_EMAIL[e]={rep:pr, count:byEmail[e].length}; });
  // Auto-assign: leads still on their rotation owner (no manual reassignment) go to the primary rep.
  const assigns=[];
  LEADS.forEach(l=>{
    const e=(l.custEmail||'').toLowerCase(); if(!e) return;
    const info=CONTACTS_BY_EMAIL[e]; if(!info||!REPS.includes(info.rep)) return;
    if(st(l.id).assignee) return;          // respect a manual reassignment
    if(effRep(l)===info.rep) return;        // already with them
    assigns.push({id:l.id, rep:info.rep});
  });
  if(assigns.length){
    try{
      await sb.from('lead_state').upsert(assigns.map(a=>({id:a.id, assignee:a.rep, updated_by:'contact-history'})));
      await sb.from('lead_history').insert(assigns.map(a=>({lead_id:a.id, actor:'system', action:'Auto-assigned to '+a.rep+' — '+a.rep+' already deals with this customer'})));
      assigns.forEach(a=>{ STATE[a.id]=Object.assign({id:a.id}, STATE[a.id]||{}, {assignee:a.rep, updated_by:'contact-history'}); });
    }catch(e){}
  }
}

// Send a reply/compose from inside the board (goes out via orders@, signed by the rep,
// then appears in the email history above). Records a real rep-attributed contact.
async function sendReply(l){
  const ta=document.getElementById("composeBody"), msg=document.getElementById("sendMsg"), btn=document.getElementById("sendBtn");
  if(!ta) return; const text=(ta.value||"").trim();
  if(!text){ ta.focus(); return; }
  const to=(l.custEmail||"").trim();
  if(!to && !l.uri){ msg.style.color="#c0392b"; msg.textContent="No customer email or thread to reply to."; return; }
  btn.disabled=true; msg.style.color="#5a6b7b"; msg.textContent="Sending…";
  try{
    const rep=(REPS.includes(MY_REP)?MY_REP:effRep(l))||ME;
    const fromMbx = REPS.includes(MY_REP) ? MY_EMAIL : ""; // reps send from their own mailbox; others fall back to orders@
    const payload={ action:"send", rep, text, to, subject:"Re: "+(l.title||"DOTmed"), signature:MY_SIG, html:MY_SIG_HTML, from:fromMbx };
    if(l.cat!=='orders' && l.uri){ payload.replyTo=l.uri; } // thread the reply for real customer conversations
    const r=await fetch(FN_URL,{method:"POST",headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY,"content-type":"application/json"},body:JSON.stringify(payload)});
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||("HTTP "+r.status));
    try{ await sb.from("contacts").insert({ customer_email: to.toLowerCase()||null, customer_name: l.display||null, rep, rep_email: MY_EMAIL||null, channel:"email", direction:"out", lead_id:l.id, listing:l.listing||null, subject:payload.subject, message_id:"board-"+Date.now() }); }catch(e){}
    await addHistory(l.id, "Replied by "+rep+" — sent from board");
    ta.value=""; msg.style.color="#1d7a3f"; msg.textContent="Sent ✓";
    setTimeout(()=>loadEmailThread(l), 1200); renderHist(l.id);
  }catch(e){ msg.style.color="#c0392b"; msg.textContent="Couldn’t send: "+String(e.message||e); }
  btn.disabled=false;
}

function buildCategory(emails, cat, cutoffMs){
  const groups={};
  emails.forEach(e=>{
    if(new Date(e.receivedDateTime).getTime() < cutoffMs) return;
    if(cat.key==="inquiries"){ if(!isInquiry(e)) return; } else { if(isNoise(e)) return; }
    const x=extractLead(e,cat.key); let g=groups[x.gkey];
    if(!g){ groups[x.gkey]={id:x.gkey,x,latest:e,first:e,count:1}; }
    else { g.count++; if(new Date(e.receivedDateTime)>new Date(g.latest.receivedDateTime)){ g.latest=e; g.x=x; } if(new Date(e.receivedDateTime)<new Date(g.first.receivedDateTime)){ g.first=e; } }
  });
  const out=[], newOwners=[], reassigned=[];
  for(const k in groups){ const g=groups[k], a=acctLabel(g.latest);
    const owner=repForCat(cat.key,effDate(new Date(g.first.receivedDateTime)));
    const cur=st(g.id);
    if(!cur.owner){ STATE[g.id]=Object.assign({id:g.id},cur,{owner}); newOwners.push({id:g.id,owner,category:cat.key}); }
    else if(cur.owner!==owner && !cur.assignee){ STATE[g.id]=Object.assign({id:g.id},cur,{owner}); reassigned.push({id:g.id,owner}); }
    out.push({ id:g.id, cat:cat.key, display:g.x.display, title:g.x.title, item:g.x.item, deal:g.x.deal,
      custEmail:g.x.custEmail, hasPhone:!!(g.x.phone||st(g.id).phone), listing:g.x.listing,
      webLink:g.latest.webLink, date:g.first.receivedDateTime, updated:g.latest.receivedDateTime,
      count:g.count, acct:a, uri:g.latest.uri||g.latest.id, sender:g.latest.sender||"", cats:(g.latest.categories||[]).slice() });
  }
  return { out, newOwners, reassigned };
}

// Orders ("congrats") emails only show the listing # in the preview — pull the buyer
// name + item (manufacturer/product) from the purchases DB so cards lead with real info.
async function enrichOrders(){
  const ids=[...new Set(LEADS.filter(l=>l.cat==='orders'&&l.listing).map(l=>l.listing))];
  if(!ids.length) return;
  try{
    const { data } = await sb.from('purchases').select('listing,customer_name,customer_email,item,order_date').in('listing',ids).limit(1000);
    const by={}; (data||[]).forEach(r=>{ (by[r.listing]=by[r.listing]||[]).push(r); });
    LEADS.forEach(l=>{
      if(l.cat!=='orders'||!l.listing) return;
      const rs=by[l.listing]; if(!rs||!rs.length) return;
      const day=(l.date||'').slice(0,10);

function htmlToText(html){
  try{ const doc=new DOMParser().parseFromString(html||"","text/html");
    ["script","style","head"].forEach(t=>doc.querySelectorAll(t).forEach(n=>n.remove()));
    doc.querySelectorAll("br").forEach(n=>n.replaceWith("\n"));
    doc.querySelectorAll("tr,div,p,li,table,h1,h2,h3,h4").forEach(n=>n.append("\n"));
    return (doc.body?doc.body.textContent:"").replace(/\r/g,"").replace(/[ \t]+\n/g,"\n").replace(/\n{3,}/g,"\n\n").trim();
  }catch(e){ return (html||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }
}
function linkify(s){
  let h=esc(String(s||""));
  h=h.replace(/(https?:\/\/[^\s<"']+)/g, function(u){ return '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>'; });
  h=h.replace(/(^|[\s(])(www\.[^\s<"']+)/g, function(_,p,u){ return p+'<a href="https://'+u+'" target="_blank" rel="noopener">'+u+'</a>'; });
  return h;
}
function pick(re,t){ const m=re.exec(t); return m?m[1].trim():""; }
function extractDetails(text){
  const kv=[];
  const name=pick(/(?:Buyer[^\n]*\n)?Name:\s*(.+)/i,text), email=pick(/Email:\s*([^\s]+@[^\s]+)/i,text), phone=pick(/Phone:\s*([+\d][\d\s().\-]{5,})/i,text);
  const addr=pick(/ADDRESS\s*=+\s*([\s\S]*?)\n\s*\n/i,text), country=pick(/Ship To Country:\s*(.+)/i,text), zip=pick(/Ship To Zip:\s*(.+)/i,text);
  const listP=pick(/Listing Price:\s*\$?([\d.,]+)/i,text), offP=pick(/Offer Price:\s*\$?([\d.,]+)/i,text);
  const total=pick(/Order Total[^\d]*([\d.,]+)\s*USD/i,text); const msg=pick(/Message:\s*([\s\S]+?)(?:\n\s*\n|$)/i,text);
  if(name) kv.push(["Customer",name]); if(email) kv.push(["Email",email]); if(phone) kv.push(["Phone",phone]);
  if(listP&&offP) kv.push(["Offer","List $"+listP+"  →  Offer $"+offP]);
  if(zip||country) kv.push(["Ship to",[zip,country].filter(Boolean).join(", ")]);
  if(addr) kv.push(["Address",addr.replace(/\n{2,}/g,"\n").trim()]);
  if(total) kv.push(["Order total","$"+total]); if(msg&&msg.length<400) kv.push(["Their message",msg.trim()]);
  return {kv,email,phone};
}

  {field:"Cardiology / Cardiovascular", kw:[/cardiac/i,/coronary/i,/angio/i,/\bvalve\b/i,/pacemaker/i,/ablation/i,/hemodynamic/i,/aortic/i,/\bcardio/i,/guidewire/i,/\bballoon\b/i,/\bcannula\b/i,/\bsheath\b/i,/femoral.*venous/i]},

  {field:"Anesthesia / Pain", kw:[/epidural/i,/tuohy/i,/spinal needle/i,/anesthesi/i,/nerve block/i,/\bregional\b/i]},

  {field:"Ophthalmology", kw:[/ophthalm/i,/intraocular/i,/\biol\b/i,/phaco/i,/vitrectom/i,/\bcornea/i,/\bretina/i]},

function inferField(rows){
  const scores={}; const signals={};
  (rows||[]).forEach(r=>{
    const txt=(r.item||"")+" "; const w=Math.min(Number(r.qty)||1,5);
    FIELD_RULES.forEach(rule=>{
      if(rule.kw.some(re=>re.test(txt))){
        scores[rule.field]=(scores[rule.field]||0)+w;
        (signals[rule.field]=signals[rule.field]||[]).push((r.item||"").split(/[-–]/)[0].trim().slice(0,46));
      }
    });
  });
  const ranked=Object.keys(scores).map(f=>({field:f,score:scores[f]})).sort((a,b)=>b.score-a.score);
  const total=ranked.reduce((s,x)=>s+x.score,0);
  if(!ranked.length) return null;
  const top=ranked[0], share=total?top.score/total:0;
  const conf= share>=0.6?"strong": share>=0.35?"likely":"mixed";
  return { top:top.field, share, conf, second: ranked[1]?ranked[1].field:null,
           sig:[...new Set(signals[top.field]||[])].slice(0,3) };
}
function renderFieldBanner(rows){
  const f=inferField(rows);
  if(!f) return '';
  const sub = (f.second? "Also seen: "+esc(f.second)+" · ":"") + (f.sig.length? "signals: "+f.sig.map(esc).join(", ") : "");
  return '<div class="fieldbox">🔬 Likely medical field: <b>'+esc(f.top)+'</b>'+
    '<span class="conf '+f.conf+'">'+f.conf+'</span>'+
    (sub?'<div class="fieldsub">'+sub+'</div>':'')+
    '<div class="fieldsub" style="opacity:.8">Best guess from purchase history — verify with the customer.</div></div>';
}

function renderPurchases(rows){
  if(!rows||!rows.length) return '<div style="color:#9aa7b4;font-size:12px">No prior orders found in the history.</div>';
  const groups={};
  rows.forEach(r=>{ const a=r.account||"SurgaMed"; (groups[a]=groups[a]||[]).push(r); });
  let h=renderFieldBanner(rows);
  Object.keys(groups).sort().forEach(acct=>{
    const list=groups[acct]; let total=0,units=0;
    // "price" from dotMed is already the line subtotal (unit price × qty), so sum it directly.
    list.forEach(r=>{ total+=Number(r.price||0); units+=Number(r.qty||1); });
    const col=ACCT_COLOR[acct]||"#5a6b7b";
    h+='<div class="acctblock"><div class="acctttl"><span class="dot" style="background:'+col+'"></span>'+esc(acct)+' <span class="pill">'+list.length+' line item'+(list.length===1?'':'s')+'</span></div>';
    h+='<div class="phsum">'+units+' unit'+(units===1?'':'s')+' · est. '+money(total)+' lifetime</div>';
    h+='<table class="phtab"><thead><tr><th>Date</th><th>Item</th><th>Listing</th><th>Qty</th><th>Price</th></tr></thead><tbody>';
    list.forEach(r=>{ h+='<tr><td>'+esc(r.order_date||"")+'</td><td>'+esc(r.item||"")+'</td><td>'+(r.listing?("#"+esc(String(r.listing))):"")+'</td><td>'+esc(String(r.qty||""))+'</td><td>'+(r.price!=null&&r.price!==""?money(r.price):"")+'</td></tr>'; });
    h+='</tbody></table></div>';
  });
  return h;
}

// Suggest live in-stock inventory based on what the customer has bought: reorders
// (same listing still in stock) + cross-sell (other in-stock items from their brands).
async function loadSuggestions(rows, l){
  const box=document.getElementById("suggBox"); if(!box) return;
  try{
    const ids=[...new Set((rows||[]).map(r=>r.listing).filter(Boolean))];
    const mfgs=[...new Set((rows||[]).map(r=>{ const m=(r.item||'').trim().match(/^[A-Za-z][A-Za-z&.\-]*/); return m?m[0].replace(/[*,()]/g,'').toUpperCase():''; }).filter(w=>w&&w.length>=2))].slice(0,6);
    if(!ids.length && !mfgs.length){ box.innerHTML='<div style="color:#9aa7b4;font-size:12px">No history to base suggestions on.</div>'; return; }
    let reorder=[];
    if(ids.length){ const { data }=await sb.from('listings').select('id,account,mfg,name,category,price,url').in('id',ids).eq('in_stock',true).limit(60); reorder=data||[]; }
    let cross=[];
    if(mfgs.length){ const orf=mfgs.map(m=>'mfg.ilike.'+m+'*').join(','); const { data }=await sb.from('listings').select('id,account,mfg,name,category,price,url').or(orf).eq('in_stock',true).limit(60); const ex=new Set([...ids,...reorder.map(r=>r.id)]); cross=(data||[]).filter(r=>!ex.has(r.id)).slice(0,12); }
    if(!reorder.length && !cross.length){ box.innerHTML='<div style="color:#9aa7b4;font-size:12px">No in-stock matches found in current inventory.</div>'; return; }
    function tbl(list){ let s='<table class="phtab"><thead><tr><th>Item</th><th>Category</th><th>Price</th><th></th></tr></thead><tbody>'; list.forEach(r=>{ s+='<tr><td>'+esc(r.name||r.mfg||'')+'</td><td>'+esc(r.category||'')+'</td><td>'+(r.price!=null?money(r.price):'')+'</td><td><a href="'+esc(r.url||'#')+'" target="_blank" rel="noopener">view</a></td></tr>'; }); s+='</tbody></table>'; return s; }
    let h='';
    if(reorder.length){ h+='<div class="phsum" style="font-weight:600;color:#1d7a3f">🔁 Reorder — bought before &amp; in stock now ('+reorder.length+')</div>'+tbl(reorder);
      h+='<div style="margin:6px 0 14px"><button id="reorderBtn" class="custbtn" style="background:#1d7a3f;border-color:#1d7a3f;padding:6px 12px">📣 Email customer: these are in stock</button> <span id="reorderMsg" style="font-size:12px;color:#5a6b7b"></span></div>';
    }
    if(cross.length){ h+='<div class="phsum" style="font-weight:600;color:#0b66c3;margin-top:10px">✨ More from brands they buy ('+cross.length+')</div>'+tbl(cross); }
    box.innerHTML=h;
    if(reorder.length && l){ const rb=document.getElementById("reorderBtn"); if(rb) rb.onclick=()=>sendReorderAlert(l, reorder); }
  }catch(e){ box.innerHTML='<div style="color:#c0392b;font-size:12px">Couldn’t load suggestions: '+esc(String(e.message||e))+'</div>'; }
}
// One-click: email the customer (from the rep's own address + signature) that their
// previously-purchased items are back in stock, with a note to flag anything else they want.
async function sendReorderAlert(l, items){
  const msg=document.getElementById("reorderMsg"), btn=document.getElementById("reorderBtn");
  const to=(l.custEmail||"").trim();
  if(!to){ if(msg){ msg.style.color="#c0392b"; msg.textContent="No customer email on this lead."; } return; }
  const first=(titleCase(l.display||"").split(/[\s,]+/)[0])||"there";
  const lines=(items||[]).map(r=>'• '+(r.name||r.mfg||'')+(r.price!=null?(' — '+money(r.price)):'')).join('\n');
  const text="Hi "+first+",\n\nGood news — the following item(s) you've purchased from us in the past are currently in stock:\n\n"+lines+"\n\nIf you'd like to reorder any of these items, simply reply to this email and we'll be happy to assist.\n\nWe're always adding new inventory, so if there are any other products you're looking for, just let us know and we'll keep you in mind as new items arrive.\n\nThank you,";
  if(!confirm("Email "+to+" about "+items.length+" in-stock item"+(items.length===1?'':'s')+"? It will send from your email with your signature.")) return;
  if(btn) btn.disabled=true; if(msg){ msg.style.color="#5a6b7b"; msg.textContent="Sending…"; }
  try{
    const rep=(REPS.includes(MY_REP)?MY_REP:effRep(l))||ME;
    const fromMbx=REPS.includes(MY_REP)?MY_EMAIL:"";
    const payload={ action:"send", rep, to, subject:"Items you've ordered are back in stock — SurgaMed", text, signature:MY_SIG, html:MY_SIG_HTML, from:fromMbx };
    const r=await fetch(FN_URL,{method:"POST",headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY,"content-type":"application/json"},body:JSON.stringify(payload)});
    const d=await r.json(); if(!r.ok||d.error) throw new Error(d.error||("HTTP "+r.status));
    try{ await sb.from("contacts").insert({ customer_email:to.toLowerCase(), customer_name:l.display||null, rep, rep_email:MY_EMAIL||null, channel:"email", direction:"out", lead_id:l.id, listing:l.listing||null, subject:payload.subject, message_id:"reorder-"+Date.now() }); }catch(e){}
    await addHistory(l.id,"Sent in-stock reorder alert ("+items.length+" item"+(items.length===1?'':'s')+") by "+rep);
    if(msg){ msg.style.color="#1d7a3f"; msg.textContent="Sent ✓"; }
    setTimeout(()=>loadEmailThread(l),1200); renderHist(l.id);
  }catch(e){ if(msg){ msg.style.color="#c0392b"; msg.textContent="Couldn’t send: "+String(e.message||e); } }
  if(btn) btn.disabled=false;
}
// Keep the purchase-history DB current: each time the board loads, scan the most
// recent orders and upsert them (idempotent). Covers a few days of new orders.
async function refreshPurchases(){
  try{
    let before=null;
    for(let i=0;i<3;i++){
      const u=FN_URL+"?ingest=orders"+(before?("&before="+encodeURIComponent(before)):"");
      const r=await fetch(u,{headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY}});
      if(!r.ok) break;
      const d=await r.json();
      before=d.nextBefore;
      if(d.done||!before) break;
    }
  }catch(e){ /* silent: history stays at last good state */ }
}

// ---- Item lookup: who bought a given item + how many are in stock ----
async function getItemBuyers(q){
  const clean=String(q).replace(/[%_]/g,"").trim();
  if(clean.length<2) return [];
  const { data } = await sb.from("purchases").select("account,customer_name,customer_email,customer_phone,item,listing,qty,price,order_date")
    .ilike("item","%"+clean+"%").order("order_date",{ascending:false}).limit(3000);
  return data||[];
}
async function getItemStock(q){
  const clean=String(q).replace(/[%_,()]/g,"").trim();
  if(clean.length<2) return [];
  const w="*"+clean.replace(/\s+/g,"*")+"*";
  const orf=["name.ilike."+w,"mfg.ilike."+w,"model.ilike."+w,"sku.ilike."+w].join(",");
  const { data } = await sb.from("listings").select("id,account,mfg,name,model,sku,category,price,quantity,in_stock,url")
    .or(orf).limit(400);
  return data||[];
}
function renderItemStock(stock){
  const inStock=(stock||[]).filter(s=>s.in_stock);
  if(!stock.length) return '<div class="fieldbox" style="background:#fbeaea">📦 No matching listings found in current inventory.</div>';
  if(!inStock.length) return '<div class="fieldbox" style="background:#fbeaea">📦 Found '+stock.length+' matching listing'+(stock.length===1?'':'s')+', but <b>none in stock</b> right now.</div>';
  const g={}; let totQty=0, qtyKnown=false;
  inStock.forEach(s=>{ const a=s.account||"SurgaMed"; const q=Number(s.quantity)||0; if(s.quantity!=null&&s.quantity!=="")qtyKnown=true; g[a]=g[a]||{n:0,q:0}; g[a].n++; g[a].q+=q; totQty+=q; });
  let h='<div class="fieldbox">📦 In stock now: <b>'+inStock.length+' listing'+(inStock.length===1?'':'s')+'</b>'+(qtyKnown?' · '+totQty+' unit'+(totQty===1?'':'s'):'');
  h+='<div class="fieldsub">'+Object.keys(g).sort().map(a=>'<span style="color:'+(ACCT_COLOR[a]||"#5a6b7b")+'">'+esc(a)+': '+g[a].n+(qtyKnown?' ('+g[a].q+' units)':'')+'</span>').join(' &nbsp;·&nbsp; ')+'</div></div>';
  h+='<table class="phtab"><thead><tr><th>Account</th><th>Item</th><th>Mfg</th><th>Qty</th><th>Price</th><th></th></tr></thead><tbody>';
  inStock.sort((a,b)=>(Number(b.quantity)||0)-(Number(a.quantity)||0)).slice(0,40).forEach(s=>{
    h+='<tr><td><span class="dot" style="background:'+(ACCT_COLOR[s.account]||"#5a6b7b")+'"></span>'+esc(s.account||"")+'</td><td>'+esc(s.name||s.model||"")+'</td><td>'+esc(s.mfg||"")+'</td><td>'+(s.quantity!=null&&s.quantity!==""?esc(String(s.quantity)):"")+'</td><td>'+(s.price!=null?money(s.price):"")+'</td><td><a href="'+esc(s.url||"#")+'" target="_blank" rel="noopener">view</a></td></tr>';
  });
  h+='</tbody></table>';
  return h;
}
function renderItemBuyers(rows){
  if(!rows||!rows.length) return '<div style="color:#9aa7b4;font-size:12px;margin-top:14px">No past buyers found for that item.</div>';
  const by={};
  rows.forEach(r=>{
    const key=(r.customer_email||"").toLowerCase()||("name:"+(r.customer_name||"").toLowerCase());
    const c=by[key]||(by[key]={name:r.customer_name||"",email:r.customer_email||"",phone:r.customer_phone||"",accts:new Set(),units:0,orders:0,last:"",items:new Set()});
    c.units+=Number(r.qty)||0; c.orders++; if((r.order_date||"")>c.last)c.last=r.order_date||"";
    if(r.account)c.accts.add(r.account); if(r.item)c.items.add(r.item);
    if(!c.name&&r.customer_name)c.name=r.customer_name; if(!c.phone&&r.customer_phone)c.phone=r.customer_phone;
  });
  const list=Object.values(by).sort((a,b)=>(b.units-a.units)||(b.last>a.last?1:-1));
  let h='<div class="phsum" style="font-weight:600;margin-top:6px">👥 '+list.length+' customer'+(list.length===1?'':'s')+' bought this · '+rows.length+' line item'+(rows.length===1?'':'s')+' total <span style="font-weight:400;color:#9aa7b4">— click a name for their full history</span></div>';
  h+='<table class="phtab"><thead><tr><th>Customer</th><th>Contact</th><th>Units</th><th>Orders</th><th>Last order</th><th>Account</th></tr></thead><tbody>';
  list.forEach((c,idx)=>{
    const contact=[c.email?'<a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a>':'', c.phone?esc(c.phone):''].filter(Boolean).join('<br>');
    const accts=[...c.accts].map(a=>'<span style="color:'+(ACCT_COLOR[a]||"#5a6b7b")+'">'+esc(a)+'</span>').join(', ');
    h+='<tr class="buyrow" id="br'+idx+'"><td><a href="#" class="buyname" data-bi="'+idx+'" data-email="'+esc(c.email||"")+'" data-name="'+esc(c.name||"")+'"><span class="bcaret">▸</span>'+esc(c.name||"(unknown)")+'</a></td><td>'+contact+'</td><td>'+c.units+'</td><td>'+c.orders+'</td><td>'+esc(c.last||"")+'</td><td>'+accts+'</td></tr>';
    h+='<tr class="buydetail" id="bd'+idx+'" style="display:none"><td colspan="6"><div class="bdwrap" id="bdw'+idx+'"></div></td></tr>';
  });
  h+='</tbody></table>';
  return h;
}
// Expand a buyer row in place to reveal that customer's complete purchase history.
async function toggleBuyer(idx, email, name, link){
  const row=document.getElementById('br'+idx), detail=document.getElementById('bd'+idx), wrap=document.getElementById('bdw'+idx);
  if(!detail) return;
  const isOpen=detail.style.display!=='none';
  if(isOpen){ detail.style.display='none'; row.classList.remove('open'); link.querySelector('.bcaret').textContent='▸'; return; }
  detail.style.display=''; row.classList.add('open'); link.querySelector('.bcaret').textContent='▾';
  if(wrap.dataset.loaded) return;
  wrap.innerHTML='<div style="color:#9aa7b4;font-size:12px;padding:6px 0">Loading full history…</div>';
  try{
    const rows=await getPurchases(email,name);
    const hdr='<div class="bdhead">📇 <b>'+esc(name||"(unknown)")+'</b>'+(email?' · '+esc(email):'')+' — complete order history across both accounts</div>';
    wrap.innerHTML=hdr+renderPurchases(rows);
    wrap.dataset.loaded='1';
  }catch(e){ wrap.innerHTML='<div style="color:#c0392b;font-size:12px;padding:6px 0">Couldn’t load history: '+esc(String(e.message||e))+'</div>'; }
}

  const o=ensureOverlay(); o.style.display="flex";
  o.innerHTML='<div class="modal"><div class="mhead"><button class="mclose" id="mClose">×</button><h3>My email signature</h3><div class="msub">Added to the bottom of every email you send from the board (you’re signed in as '+esc(MY_REP||ME)+')</div></div>'+
    '<div class="mbody"><label style="font-size:12px;color:#5a6b7b;display:block;margin-bottom:6px"><input type="checkbox" id="sigHtml"'+(MY_SIG_HTML?' checked':'')+'> This signature is HTML (paste a rich/HTML signature — supports formatting, links &amp; a hosted logo image)</label>'+
    '<textarea id="sigText" placeholder="e.g.&#10;Deysi Calvo&#10;SurgaMed&#10;305-555-1234 · sales@surgamed.com" style="width:100%;box-sizing:border-box;min-height:170px;padding:8px;border:1px solid #cdd6df;border-radius:8px;font-size:13px;font-family:inherit"></textarea>'+
    '<div style="margin-top:8px;display:flex;gap:8px;align-items:center"><button id="sigSave" class="custbtn" style="background:#1d7a3f;border-color:#1d7a3f">Save signature</button><span id="sigMsg" style="font-size:12px;color:#5a6b7b"></span></div>'+
    '<div style="margin-top:12px;font-size:11px;color:#9aa7b4">For a logo, host the image at a public URL and include &lt;img src="https://…"&gt; in an HTML signature. Plain-text signatures are kept exactly as typed.</div></div></div>';
  document.getElementById("mClose").onclick=closeDetail;
  document.getElementById("sigText").value=MY_SIG;
  document.getElementById("sigSave").onclick=async()=>{
    const v=document.getElementById("sigText").value; const ishtml=document.getElementById("sigHtml").checked;
    const msg=document.getElementById("sigMsg"); msg.style.color="#5a6b7b"; msg.textContent="Saving…";
    try{
      await sb.from("rep_settings").upsert({ rep_email:MY_EMAIL, rep_name:(MY_REP||ME), signature:v, is_html:ishtml, updated_at:new Date().toISOString() });
      MY_SIG=v; MY_SIG_HTML=ishtml; msg.style.color="#1d7a3f"; msg.textContent="Saved ✓ — it’ll be added to every email you send from the board.";
    }catch(e){ msg.style.color="#c0392b"; msg.textContent="Couldn’t save: "+String(e.message||e); }
  };
}

// ---- Presence / Team activity (admin-only) ----
const ADMINS=["mweinreb@surgamed.com","sgluck@surgamed.com"];
const TEAM=[ {email:"dcalvo@surgamed.com",name:"Deysi"}, {email:"malejo@surgamed.com",name:"Mirian"}, {email:"jlugo@surgamed.com",name:"Jennifer"}, {email:"tcohen@surgamed.com",name:"Tehila"} ];
async function markPresence(u){
  try{ await sb.from("presence").upsert({ id:u.id, email:(u.email||"").toLowerCase(), name:ME, last_seen:new Date().toISOString() }); }catch(e){}
}
function relTime(t){ const s=(Date.now()-t)/1000; if(s<60) return Math.max(0,Math.floor(s))+"s ago"; if(s<3600) return Math.floor(s/60)+"m ago"; if(s<86400) return Math.floor(s/3600)+"h ago"; return new Date(t).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
async function openTeamActivity(){
  const o=ensureOverlay(); o.style.display="flex";
  o.innerHTML='<div class="modal"><div class="mhead"><button class="mclose" id="mClose">×</button><h3>Team activity</h3><div class="msub">Who’s on the board and when each rep was last active — visible to you only</div></div><div class="mbody"><div id="taBody"><div style="color:#9aa7b4;font-size:12px">Loading…</div></div></div></div>';
  document.getElementById("mClose").onclick=closeDetail;
  try{
    const { data, error } = await sb.from("presence").select("*");
    if(error) throw error;
    const byEmail={}; (data||[]).forEach(r=>{ byEmail[(r.email||"").toLowerCase()]=r; });
    const now=Date.now();
    let h='<table class="phtab"><thead><tr><th>Rep</th><th>Status</th><th>Last active</th></tr></thead><tbody>';
    TEAM.forEach(p=>{
      const r=byEmail[p.email]; let status='<span style="color:#9aa7b4">— never signed in</span>', last='—';
      if(r && r.last_seen){ const t=new Date(r.last_seen).getTime(); const online=(now-t)/60000 < 3;
        status = online ? '<span style="color:#1d7a3f;font-weight:700">● Online now</span>' : '<span style="color:#8794a1">○ Offline</span>';
        last = relTime(t);
      }
      h+='<tr><td>'+esc(p.name)+'<div style="color:#9aa7b4;font-size:11px">'+esc(p.email)+'</div></td><td>'+status+'</td><td>'+last+'</td></tr>';
    });
    h+='</tbody></table><div style="color:#9aa7b4;font-size:11px;margin-top:8px">“Online” = active in the last 3 minutes. Updates while a rep has the board open.</div>';
    document.getElementById("taBody").innerHTML=h;
  }catch(e){ document.getElementById("taBody").innerHTML='<div style="color:#c0392b;font-size:12px">Couldn’t load: '+esc(String(e.message||e))+'</div>'; }
}

document.getElementById("hideClosed").onchange=renderBoard;

sb.auth.onAuthStateChange((e, session)=>{ if(session) showApp(session); });
boot();
