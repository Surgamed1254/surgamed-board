<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SurgaMed — dotMed Lead Board</title>
<style>
:root{ color-scheme: light; }
*{ box-sizing:border-box; }
body{ margin:0; background:#f4f6f9; color:#16202c; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px; line-height:1.45; }
.wrap{ padding:18px 20px 60px; max-width:1500px; margin:0 auto; }
h1{ font-size:20px; margin:0 0 2px; }
.sub{ color:#5a6b7b; font-size:13px; margin:0 0 14px; }
.rotabar{ background:#fff; border:1px solid #e1e7ee; border-radius:12px; padding:14px 16px; margin-bottom:16px; }
.rotabar .day{ font-weight:600; color:#0b66c3; }
.rota-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:10px; }
.rota-card{ border:1px solid #e6ebf1; border-radius:9px; padding:10px 12px; background:#fafcff; }
.rota-card .cat{ font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#7b8a99; font-weight:600;}
.rota-card .rep{ font-size:16px; font-weight:700; margin-top:3px; }
.controls{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:14px; }
.controls select{ padding:7px 9px; border:1px solid #cdd6df; border-radius:8px; background:#fff; font-size:13px; }
.counts{ margin-left:auto; color:#5a6b7b; font-size:12.5px; }
.whoami{ font-size:12px; color:#5a6b7b; }
.whoami b{ color:#16202c; }
.signout{ background:none;border:1px solid #d7dee6;border-radius:7px;padding:5px 10px;cursor:pointer;font-size:12px; }
.board{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-items:start; }
.col{ background:#eef1f5; border-radius:12px; padding:10px; min-height:120px; }
.col h2{ font-size:13px; margin:2px 4px 4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.col .folder{ font-size:11px; color:#8794a1; margin:0 4px 10px; }
.col h2 .pill{ background:#fff; border-radius:20px; padding:1px 9px; font-size:12px; color:#5a6b7b; border:1px solid #e0e6ec; }
.col h2 .ontoday{ font-size:11px; font-weight:600; color:#0b66c3; background:#e2efff; border-radius:20px; padding:2px 8px; }
.card{ background:#fff; border:1px solid #e4e9ef; border-radius:10px; padding:11px 12px; margin-bottom:10px; box-shadow:0 1px 2px rgba(20,32,44,.04); }
.cardhead{ cursor:pointer; }
.cardhead:hover .from{ text-decoration:underline; }
.cardhint{ font-size:10.5px; color:#0b66c3; margin:0 0 7px; }
.card .from{ font-weight:600; font-size:13.5px; }
.card .ttl{ color:#42505e; font-size:12.5px; margin:3px 0 2px; }
.card .item{ color:#6b7886; font-size:11.5px; margin:0 0 7px; max-height:34px; overflow:hidden; }
.card .meta{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:8px; }
.tag{ font-size:11px; border-radius:20px; padding:2px 8px; font-weight:600; }
.tag.rep{ background:#ede7ff; color:#5b3fc4; }
.tag.date{ background:#f0f3f6; color:#6b7886; font-weight:500; }
.tag.acct{ background:#e6f4ea; color:#1d7a3f; font-weight:500; }
.tag.acct.sd{ background:#fdeede; color:#9a5b14; }
.tag.thread{ background:#fff3e0; color:#a5631a; }
.tag.deal{ background:#e8f0fe; color:#1a52b8; font-weight:600; }
.tag.ph{ background:#e9f7f1; color:#138a5e; font-weight:500; }
.row2{ display:flex; gap:6px; margin-bottom:7px; }
.row2 select{ flex:1; padding:5px 6px; border:1px solid #d2dae2; border-radius:7px; font-size:12px; background:#fff; }
.statusbadge{ width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; vertical-align:middle; }
.actions{ display:flex; gap:5px; flex-wrap:wrap; }
.actions a,.actions button{ flex:1; min-width:58px; text-align:center; text-decoration:none; font-size:11.5px; font-weight:600; padding:6px 4px; border-radius:7px; border:1px solid #d7dee6; background:#f7f9fb; color:#16202c; cursor:pointer; }
.actions a:hover,.actions button:hover{ background:#eef3f8; }
.empty{ color:#9aa7b4; font-size:12.5px; text-align:center; padding:18px 4px; }
.loading{ text-align:center; padding:50px; color:#5a6b7b; }
.err{ background:#fde8e8; color:#a5281b; border:1px solid #f3c2bd; border-radius:10px; padding:12px 14px; margin-bottom:14px; font-size:13px; }
.note{ font-size:11.5px; color:#8794a1; margin-top:18px; line-height:1.5; }
#signin{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#f4f6f9; }
.card-signin{ background:#fff; border:1px solid #e1e7ee; border-radius:14px; padding:36px 40px; text-align:center; box-shadow:0 8px 30px rgba(20,32,44,.08); max-width:380px; }
.card-signin h1{ font-size:19px; margin:0 0 6px; }
.card-signin p{ color:#5a6b7b; font-size:13px; margin:0 0 22px; }
.msbtn{ display:inline-flex; align-items:center; gap:10px; background:#2f2f2f; color:#fff; border:none; border-radius:8px; padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer; }
.overlay{ position:fixed; inset:0; background:rgba(20,32,44,.45); display:flex; align-items:flex-start; justify-content:center; padding:30px 16px; z-index:50; overflow:auto; }
.modal{ background:#fff; border-radius:14px; max-width:680px; width:100%; box-shadow:0 12px 40px rgba(20,32,44,.25); overflow:hidden; }
.modal .mhead{ padding:16px 20px; border-bottom:1px solid #eef1f5; position:relative; }
.modal .mhead h3{ margin:0 0 4px; font-size:17px; }
.modal .mhead .msub{ color:#5a6b7b; font-size:12.5px; }
.modal .mclose{ position:absolute; top:12px; right:14px; border:none; background:#f0f3f6; border-radius:8px; width:30px; height:30px; font-size:16px; cursor:pointer; color:#42505e; }
.modal .mbody{ padding:16px 20px; max-height:62vh; overflow:auto; }
.kv{ display:grid; grid-template-columns:120px 1fr; gap:4px 12px; margin-bottom:14px; font-size:13px; }
.kv .k{ color:#7b8a99; font-weight:600; }
.kv .v{ color:#16202c; white-space:pre-wrap; }
.bodytext{ white-space:pre-wrap; font-family:inherit; font-size:12.5px; color:#2c3a47; background:#f7f9fb; border:1px solid #eef1f5; border-radius:8px; padding:12px 14px; margin:0; line-height:1.5; }
.bodytext a{ color:#0b66c3; word-break:break-all; }
.mbody h4{ font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:#7b8a99; margin:0 0 8px; }
.modal .mfoot{ padding:12px 20px; border-top:1px solid #eef1f5; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.modal .mfoot .row2{ margin:0; flex:1 1 200px; }

.phtab{ width:100%; border-collapse:collapse; font-size:12px; margin:4px 0 6px; }
.phtab th{ text-align:left; color:#7b8a99; font-weight:600; border-bottom:1px solid #e6ebf1; padding:4px 6px; }
.phtab td{ border-bottom:1px solid #f0f3f6; padding:4px 6px; vertical-align:top; }
.acctttl{ font-weight:700; margin:12px 0 4px; display:flex; align-items:center; gap:8px; }
.acctttl .pill{ background:#f0f3f6; border-radius:20px; padding:1px 9px; font-size:11px; color:#5a6b7b; font-weight:500; }
.acctttl .dot{ width:9px;height:9px;border-radius:50%;display:inline-block; }
.acctblock{ margin-bottom:8px; }
.phsum{ font-size:11.5px; color:#5a6b7b; margin-bottom:4px; }
.fieldbox{ background:#eef4ff; border:1px solid #d4e2fb; border-radius:9px; padding:9px 12px; margin-bottom:12px; font-size:12.5px; color:#16334d; }
.fieldbox b{ color:#0b4a8a; }
.fieldbox .conf{ font-size:11px; font-weight:600; border-radius:20px; padding:1px 8px; margin-left:6px; }
.fieldbox .conf.strong{ background:#d6f0e0; color:#1d7a3f; }
.fieldbox .conf.likely{ background:#fdeede; color:#9a5b14; }
.fieldbox .conf.mixed{ background:#eceff2; color:#5a6b7b; }
.fieldbox .fieldsub{ color:#5a6b7b; font-size:11px; margin-top:3px; }
.custbtn{ background:#0b66c3; color:#fff; border:1px solid #0b66c3; border-radius:7px; padding:5px 12px; cursor:pointer; font-size:12px; font-weight:600; }
.custbtn:hover{ background:#0a5aad; }
.board.listview{ display:block; }
.ltab{ width:100%; border-collapse:collapse; background:#fff; border:1px solid #e4e9ef; border-radius:10px; overflow:hidden; font-size:13px; }
.ltab th{ text-align:left; background:#f4f6f9; color:#5a6b7b; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.03em; padding:8px 10px; border-bottom:1px solid #e1e7ee; }
.ltab td{ padding:8px 10px; border-bottom:1px solid #eef1f5; vertical-align:top; }
.ltab tr:hover td{ background:#f7f9fb; }
.ltab .lcust{ cursor:pointer; min-width:140px; }
.ltab .lcust:hover b{ text-decoration:underline; color:#0b66c3; }
.ltab .lsub{ color:#8794a1; font-size:11px; margin-top:2px; }
.ltab .litem{ color:#42505e; max-width:360px; }
.ltab select{ padding:4px 6px; border:1px solid #d2dae2; border-radius:6px; font-size:12px; background:#fff; max-width:110px; }
.ltab .nowrap{ white-space:nowrap; color:#6b7886; }
.ltab .lact{ white-space:nowrap; }
.ltab .lact a,.ltab .lact button{ font-size:11px; font-weight:600; padding:4px 7px; border-radius:6px; border:1px solid #d7dee6; background:#f7f9fb; color:#16202c; cursor:pointer; text-decoration:none; margin-right:3px; }
.ltab .lact a:hover,.ltab .lact button:hover{ background:#eef3f8; }
@media(max-width:1100px){ .board,.rota-grid{ grid-template-columns:repeat(2,1fr);} }
@media(max-width:620px){ .board,.rota-grid{ grid-template-columns:1fr;} .kv{ grid-template-columns:1fr; } }
</style>

<body>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
const SB_URL = "https://ecjemcrpbzeocoiwslcu.supabase.co";
const SB_KEY = "sb_publishable_GhYb1dkRQKdH5oimsnhaYA_A8QYT3Yq";
const FN_URL = SB_URL + "/functions/v1/leads";
const sb = createClient(SB_URL, SB_KEY);
const BUILD = "listview-enrich-1"; // feature marker

const REPS = ["Deysi","Mirian","Jennifer","Tehila"];
const CATS = [
  {key:"orders",    label:"Orders / Congrats", folder:"orders placed"},
  {key:"inquiries", label:"Inquiries",         folder:"Inbox (filtered)"},
  {key:"offers",    label:"Offers",            folder:"Dotmed Offer for Listing"},
  {key:"quotes",    label:"Shipping Quotes",   folder:"shipping quote requests"}
];
const STATUSES = [
  {key:"new",label:"New",color:"#9aa7b4"},
  {key:"working",label:"Working",color:"#2e86de"},
  {key:"waiting",label:"Waiting on customer",color:"#f0932b"},
  {key:"upsell",label:"Upsell offered",color:"#8e44ad"},
  {key:"closed",label:"Closed",color:"#27ae60"}
];
const ANCHOR = new Date(2026,5,16);

let ME = "";
let STATE = {};
let LEADS = [];
let TOKEN = "";
let VIEW = localStorage.getItem('sg_view') || 'cards';

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function signinErr(m){ const e=document.getElementById("signinErr"); e.style.display="block"; e.textContent=m; }

document.getElementById("msBtn").onclick = async () => {
  const { error } = await sb.auth.signInWithOAuth({
    provider: "azure",
    options: { scopes: "openid profile email", redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) signinErr(error.message);
};
document.getElementById("signout").onclick = async () => { await sb.auth.signOut(); location.reload(); };

let booted=false;
function showSignin(){ if(booted) return; document.getElementById("signin").style.display="flex"; document.getElementById("app").style.display="none"; }
async function showApp(session){
  if (booted) return; booted=true;
  TOKEN = session.access_token;
  const u = session.user;
  ME = (u.user_metadata && (u.user_metadata.name || u.user_metadata.full_name)) || u.email || "unknown";
  document.getElementById("whoami").innerHTML = "Signed in as <b>"+esc(ME)+"</b>";
  // Default each rep's view to their own leads; they can switch to Everyone or anyone specific.
  const REP_EMAILS = { "dcalvo@surgamed.com":"Deysi", "malejo@surgamed.com":"Mirian", "jlugo@surgamed.com":"Jennifer", "tcohen@surgamed.com":"Tehila" };
  const idStr = (ME+" "+(u.email||"")).toLowerCase();
  const myRep = REP_EMAILS[(u.email||"").toLowerCase()] || REPS.find(r => idStr.includes(r.toLowerCase()));
  if(myRep) document.getElementById("repFilter").value = myRep;
  // Presence: record this user's "last seen" now and every minute while the board is open.
  markPresence(u); setInterval(()=>markPresence(u), 60000);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) markPresence(u); });
  // Team-activity view is visible only to the admin (Meir).
  if(ADMINS.includes((u.email||"").toLowerCase())){ const ta=document.getElementById("teamActivity"); ta.style.display=""; ta.onclick=openTeamActivity; }
  document.getElementById("signin").style.display="none";
  document.getElementById("app").style.display="block";
  renderRota();

  await load();

async function boot(){
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp(session); else showSignin();
}

function midnight(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function rotationOffset(target){
  const a=midnight(ANCHOR), t=midnight(target);
  if(a.getTime()===t.getTime()) return 0;
  let step=t.getTime()>a.getTime()?1:-1, d=0; const cur=new Date(a);
  while(cur.getTime()!==t.getTime()){ cur.setDate(cur.getDate()+step); const w=cur.getDay(); if(w!==0&&w!==6) d+=step; }
  return d;
}
function repForCat(catKey,date){ let ci=0; CATS.forEach((c,i)=>{ if(c.key===catKey) ci=i; }); const d=rotationOffset(date); return REPS[(((ci-d)%4)+4)%4]; }
// Effective "owning business day" for a timestamp, evaluated in US Eastern:
//  - handoff at 6 PM ET (after 6 PM rolls to the next business day's rep)
//  - Sat/Sun (and Friday after 6 PM) roll forward to Monday's rep
function effDate(d){
  const f=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',hourCycle:'h23'});
  const o={}; f.formatToParts(new Date(d)).forEach(p=>{ o[p.type]=p.value; });
  let x=new Date(Number(o.year), Number(o.month)-1, Number(o.day), 12, 0, 0);
  if(Number(o.hour)>=18) x.setDate(x.getDate()+1);
  while(x.getDay()===0||x.getDay()===6) x.setDate(x.getDate()+1);
  return x;
}
function businessRef(){ return effDate(new Date()); }

function titleCase(s){ return (s||"").replace(/\b\w/g,c=>c.toUpperCase()); }
function senderName(s){ if(!s) return ""; const m=/^([^<]+)</.exec(s); if(m) return m[1].trim().replace(/^"|"$/g,""); if(/@/.test(s)) return s.split("@")[0].replace(/[._]/g," "); return s; }
function senderEmail(s){ const m=/<([^>]+)>/.exec(s||""); if(m) return m[1]; return (s||"").trim(); }
function isAuto(s){ return /auto@dotmed\.com/i.test(s||""); }
function normSubject(s){ return (s||"").replace(/^\s*((re|fw|fwd)\s*:\s*)+/i,"").replace(/\[external\]/ig,"").replace(/\s+/g," ").trim(); }
function ourAddr(e){ return /surgamed\.com|shortdatedsurgical\.com|dotmed/i.test(e||""); }
function fmtDate(d){ const dt=new Date(d),n=new Date(),o={month:"short",day:"numeric"}; if(dt.getFullYear()!==n.getFullYear())o.year="numeric"; return dt.toLocaleDateString(undefined,o); }
function statusObj(k){ return STATUSES.find(s=>s.key===k)||STATUSES[0]; }
const KNOWN_CATS = new Set();
const STATUS_LABELS = STATUSES.map(s=>s.label);
async function freshToken(){ try{ const { data:{ session } }=await sb.auth.getSession(); if(session) TOKEN=session.access_token; }catch(e){} return TOKEN; }
async function writeCats(lead, cats){
  const set=[...new Set((cats||[]).map(c=>String(c).trim()).filter(Boolean))].slice(0,25);
  try{
    const r=await fetch(FN_URL,{method:"POST",headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY,"content-type":"application/json"},body:JSON.stringify({id:lead.uri,categories:set})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok){ alert("Couldn't save tags to Outlook: "+(j.error||("HTTP "+r.status))); return false; }
    lead.cats=Array.isArray(j.categories)?j.categories:set; lead.cats.forEach(c=>KNOWN_CATS.add(c)); return true;
  }catch(e){ alert("Couldn't save tags: "+e); return false; }
}
function renderTags(l){
  const box=document.getElementById("tagsBox"); if(!box) return;
  const cur=l.cats||[];
  let h='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">';
  if(cur.length){ cur.forEach(c=>{ h+='<span class="tag" style="background:#e2efff;color:#0b66c3;cursor:pointer" data-rm="'+esc(c)+'" title="Remove">'+esc(c)+' ✕</span>'; }); }
  else h+='<span style="color:#9aa7b4;font-size:12px">No tags on this email</span>';
  h+='</div>';
  const sugg=[...new Set([...KNOWN_CATS, ...REPS, ...STATUS_LABELS])].filter(c=>!cur.includes(c));
  if(sugg.length){ h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">'; sugg.forEach(c=>{ h+='<span class="tag" style="background:#f0f3f6;color:#42505e;cursor:pointer" data-add="'+esc(c)+'">+ '+esc(c)+'</span>'; }); h+='</div>'; }
  h+='<div style="display:flex;gap:6px"><input id="tagIn" placeholder="New tag…" style="flex:1;padding:6px 8px;border:1px solid #cdd6df;border-radius:7px;font-size:12.5px"><button id="tagAdd" style="padding:6px 12px;border:1px solid #d7dee6;border-radius:7px;background:#f7f9fb;font-weight:600;cursor:pointer">Add</button></div>';
  box.innerHTML=h;
  box.querySelectorAll("[data-rm]").forEach(el=>{ el.onclick=async()=>{ el.style.opacity=.5; await writeCats(l,(l.cats||[]).filter(x=>x!==el.getAttribute("data-rm"))); renderTags(l); renderBoard(); }; });
  box.querySelectorAll("[data-add]").forEach(el=>{ el.onclick=async()=>{ el.style.opacity=.5; await writeCats(l,[...(l.cats||[]),el.getAttribute("data-add")]); renderTags(l); renderBoard(); }; });
  const ta=document.getElementById("tagAdd"), ti=document.getElementById("tagIn");
  ta.onclick=async()=>{ const v=ti.value.trim(); if(!v)return; ta.disabled=true; await writeCats(l,[...(l.cats||[]),v]); ti.value=""; renderTags(l); renderBoard(); };
  ti.addEventListener("keydown",e=>{ if(e.key==="Enter") ta.onclick(); });
}

function isNoise(email){
  const s=(email.subject||"").toLowerCase(), snd=(email.sender||"").toLowerCase();
  if(/dotmed-mail\.com|cloud-protect\.net|mailer-daemon|postmaster|@facebookmail|linkedin\.com|github\.com|indeed\.com|upwork\.com|godaddy|paypal\.com|anthropic\.com|intuit|quickbooks|stripe\.com|squareup|@amazon|billing@/.test(snd)) return true;
  if(/(no-?reply|do-not-reply|noreply)/.test(snd) && !isAuto(snd)) return true;
  if(/listing download|parts alerts|equipment.*alert|forums|quarantine|daily digest|expiring|reminder|out of office|undeliverable|automatic reply|^read:|^not read:|receipt|your invoice|updated your invoice|we sent your invoice|invoice #|payment received/.test(s)) return true;
  return false;
}
function isInquiry(email){
  if(isNoise(email)) return false;
  const snd=(email.sender||"").toLowerCase();
  if(isAuto(snd)) return /sent you this email regarding/i.test(email.summary||"");
  if(ourAddr(snd)) return false;
  return true;
}
function firstCustomerEmail(s){ const re=/([A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,})/g; let m; while((m=re.exec(s))){ if(!ourAddr(m[1])) return m[1]; } return ""; }
function firstPhone(s){ let m=/(\+\d[\d\s().\-]{6,}\d)/.exec(s); if(m) return m[1].replace(/[^\d+]/g,""); m=/\b(\d{3}[\s.\-]\d{3}[\s.\-]\d{4})\b/.exec(s); if(m) return m[1].replace(/[^\d]/g,""); return ""; }

function extractLead(email,catKey){
  const s=email.summary||"", subj=email.subject||"", blob=subj+" — "+s;
  let listing=""; const mL=/Listing\s*#?\s*(\d{4,})/i.exec(blob); if(mL) listing=mL[1];
  const real=!isAuto(email.sender);
  let custName="",company="",custEmail="",phone="",deal="",extra="",item="";
  if(real){ custName=senderName(email.sender); custEmail=senderEmail(email.sender); }
  const mE=/Email:\s*([^\s,;<>]+@[^\s,;<>]+)/i.exec(s); if(!custEmail && mE) custEmail=mE[1];
  if(catKey==="offers"){
    const mo=/made by\s+(.+?)\s+of\s+(.+?)\s+in\s+/i.exec(s); if(mo){ if(!custName)custName=mo[1].trim(); company=mo[2].trim(); }
    const lp=/Listing Price:\s*\$?([\d.,]+)/i.exec(s), op=/Offer Price:\s*\$?([\d.,]+)/i.exec(s);
    if(lp&&op) deal="List $"+lp[1]+" → Offer $"+op[1];
    const io=/for Listing\s*#?\d+,\s*(.+?),\s*was made by/i.exec(s); if(io) item=io[1].trim();
  } else if(catKey==="quotes"){
    const mc=/Ship To Country:\s*(.+)/i.exec(s); if(mc) extra="Ship to "+mc[1].trim();
    if(!custEmail) custEmail=firstCustomerEmail(s);
    const qi=/Listing\s*#?\d+\s*[-–]\s*(.+?)[\r\n]/i.exec(s); if(qi) item=qi[1].trim();
  } else if(catKey==="inquiries"){
    if(isAuto(email.sender)){
      const mi=/([A-Za-z][\w .'\-]+?)\s+of\s+(.+?)\s+sent you this email/i.exec(s);
      if(mi){ custName=mi[1].trim(); company=mi[2].trim(); }
      else { const m2=/^\s*([A-Za-z][\w .'\-]+?)\s+sent you this email/i.exec(s); if(m2) custName=m2[1].trim(); }
      custEmail=firstCustomerEmail(s); phone=firstPhone(s);
      const ii=/regarding Listing\s*#?\d+,\s*(.+?)\.(?:\s|$|\r|\n)/i.exec(s); if(ii) item=ii[1].trim();
    } else item=normSubject(subj);
  }
  let display=custName||company;
  if(!display) display = custEmail ? custEmail.split("@")[0] : (listing?("Listing #"+listing):"dotMed lead");
  if(company && custName && company.toLowerCase()!==custName.toLowerCase()) display=custName+" · "+company;
  let title;
  if(catKey==="orders") title="Order placed"+(listing?" · #"+listing:"");
  else if(catKey==="offers") title="Offer"+(listing?" · #"+listing:"");
  else if(catKey==="quotes") title="Shipping quote"+(listing?" · #"+listing:"")+(extra?" · "+extra:"");
  else title = isAuto(email.sender) ? ("Inquiry"+(listing?" · #"+listing:"")) : normSubject(subj);
  const who=custEmail||custName||company||"";
  let gkey;
  if(listing) gkey=catKey+":L"+listing+"|"+who.toLowerCase();
  else if(who) gkey=catKey+":"+normSubject(subj).toLowerCase()+"|"+who.toLowerCase();
  else gkey=catKey+":id:"+(email.id||Math.random());
  return {listing,custName,company,custEmail,phone,deal,item,display,title,gkey};
}
function acctLabel(email){ const r=(email.recipients&&email.recipients.join(" "))||""; return /shortdated/i.test(r)?{t:"ShortDated",sd:true}:{t:"SurgaMed",sd:false}; }

function buildCategory(emails, cat, cutoffMs){
  const groups={};
  emails.forEach(e=>{
    if(new Date(e.receivedDateTime).getTime() < cutoffMs) return;
    if(cat.key==="inquiries"){ if(!isInquiry(e)) return; } else { if(isNoise(e)) return; }
    const x=extractLead(e,cat.key); let g=groups[x.gkey];
    if(!g){ groups[x.gkey]={id:x.gkey,x,latest:e,first:e,count:1}; }
    else { g.count++; if(new Date(e.receivedDateTime)>new Date(g.latest.receivedDateTime)){ g.latest=e; g.x=x; } if(new Date(e.receivedDateTime)<new Date(g.first.receivedDateTime)){ g.first=e; } }
  });
  const out=[], newOwners=[], reassigned=[];
  for(const k in groups){ const g=groups[k], a=acctLabel(g.latest);
    const owner=repForCat(cat.key,effDate(new Date(g.first.receivedDateTime)));
    const cur=st(g.id);
    if(!cur.owner){ STATE[g.id]=Object.assign({id:g.id},cur,{owner}); newOwners.push({id:g.id,owner,category:cat.key}); }
    else if(cur.owner!==owner && !cur.assignee){ STATE[g.id]=Object.assign({id:g.id},cur,{owner}); reassigned.push({id:g.id,owner}); }
    out.push({ id:g.id, cat:cat.key, display:g.x.display, title:g.x.title, item:g.x.item, deal:g.x.deal,
      custEmail:g.x.custEmail, hasPhone:!!(g.x.phone||st(g.id).phone), listing:g.x.listing,
      webLink:g.latest.webLink, date:g.first.receivedDateTime, updated:g.latest.receivedDateTime,
      count:g.count, acct:a, uri:g.latest.uri||g.latest.id, sender:g.latest.sender||"", cats:(g.latest.categories||[]).slice() });
  }
  return { out, newOwners, reassigned };
}

// Orders ("congrats") emails only show the listing # in the preview — pull the buyer

async function enrichOrders(){
  const ids=[...new Set(LEADS.filter(l=>l.cat==='orders'&&l.listing).map(l=>l.listing))];
  if(!ids.length) return;
  try{
    const { data } = await sb.from('purchases').select('listing,customer_name,customer_email,item,order_date').in('listing',ids).limit(1000);
    const by={}; (data||[]).forEach(r=>{ (by[r.listing]=by[r.listing]||[]).push(r); });
    LEADS.forEach(l=>{
      if(l.cat!=='orders'||!l.listing) return;
      const rs=by[l.listing]; if(!rs||!rs.length) return;
      const day=(l.date||'').slice(0,10);
      const m=rs.find(r=>r.order_date===day)||rs[0];
      if(m.customer_name) l.display=m.customer_name;
      if(m.customer_email && !l.custEmail) l.custEmail=m.customer_email;
      if(m.item) l.item=m.item;
    });
  }catch(e){}
}
async function load(){
  document.getElementById("errbox").innerHTML="";
  document.getElementById("board").innerHTML='<div class="loading">Loading leads…</div>';
  const days=parseInt(document.getElementById("window").value,10);
  const cutoff=Date.now()-days*86400000;
  try{
    const data=await fetchLeads();
    let all=[], owners=[], reassigned=[];
    CATS.forEach(c=>{ const r=buildCategory(data[c.key]||[], c, cutoff); all=all.concat(r.out); owners=owners.concat(r.newOwners); reassigned=reassigned.concat(r.reassigned); });
    LEADS=all;
    LEADS.forEach(l=>(l.cats||[]).forEach(c=>KNOWN_CATS.add(c)));
    await enrichOrders();
    if(owners.length){ await sb.from("lead_state").upsert(owners.map(o=>({id:o.id,owner:o.owner,category:o.category,status:"new",updated_by:"rotation"}))); }
    if(reassigned.length){

      await sb.from("lead_history").insert(reassigned.map(o=>({lead_id:o.id, actor:"system", action:"Owner set to "+o.owner+" — applied new 6 PM ET / weekend rotation rule"})));

      "Tap any lead for the full email. Status, ownership &amp; history are saved for the whole team. Changes are stamped with your name ("+esc(ME)+").";

  }
}

function htmlToText(html){
  try{ const doc=new DOMParser().parseFromString(html||"","text/html");
    ["script","style","head"].forEach(t=>doc.querySelectorAll(t).forEach(n=>n.remove()));
    doc.querySelectorAll("br").forEach(n=>n.replaceWith("\n"));
    doc.querySelectorAll("tr,div,p,li,table,h1,h2,h3,h4").forEach(n=>n.append("\n"));
    return (doc.body?doc.body.textContent:"").replace(/\r/g,"").replace(/[ \t]+\n/g,"\n").replace(/\n{3,}/g,"\n\n").trim();
  }catch(e){ return (html||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim(); }
}
function linkify(s){
  let h=esc(String(s||""));
  h=h.replace(/(https?:\/\/[^\s<"']+)/g, function(u){ return '<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>'; });
  h=h.replace(/(^|[\s(])(www\.[^\s<"']+)/g, function(_,p,u){ return p+'<a href="https://'+u+'" target="_blank" rel="noopener">'+u+'</a>'; });
  return h;
}
function pick(re,t){ const m=re.exec(t); return m?m[1].trim():""; }
function extractDetails(text){
  const kv=[];
  const name=pick(/(?:Buyer[^\n]*\n)?Name:\s*(.+)/i,text), email=pick(/Email:\s*([^\s]+@[^\s]+)/i,text), phone=pick(/Phone:\s*([+\d][\d\s().\-]{5,})/i,text);
  const addr=pick(/ADDRESS\s*=+\s*([\s\S]*?)\n\s*\n/i,text), country=pick(/Ship To Country:\s*(.+)/i,text), zip=pick(/Ship To Zip:\s*(.+)/i,text);
  const listP=pick(/Listing Price:\s*\$?([\d.,]+)/i,text), offP=pick(/Offer Price:\s*\$?([\d.,]+)/i,text);
  const total=pick(/Order Total[^\d]*([\d.,]+)\s*USD/i,text); const msg=pick(/Message:\s*([\s\S]+?)(?:\n\s*\n|$)/i,text);
  if(name) kv.push(["Customer",name]); if(email) kv.push(["Email",email]); if(phone) kv.push(["Phone",phone]);
  if(listP&&offP) kv.push(["Offer","List $"+listP+"  →  Offer $"+offP]);
  if(zip||country) kv.push(["Ship to",[zip,country].filter(Boolean).join(", ")]);
  if(addr) kv.push(["Address",addr.replace(/\n{2,}/g,"\n").trim()]);
  if(total) kv.push(["Order total","$"+total]); if(msg&&msg.length<400) kv.push(["Their message",msg.trim()]);
  return {kv,email,phone};
}

}

// ---- Customer purchase history ----
const ACCT_COLOR={ "SurgaMed":"#1d7a3f", "ShortDated Surgical":"#9a5b14" };
async function getPurchases(email,name){
  let rows=[];
  if(email){
    const { data } = await sb.from("purchases").select("*").eq("customer_email",String(email).toLowerCase()).order("order_date",{ascending:false}).limit(500);
    rows=data||[];
  }
  if(!rows.length && name){
    const clean=String(name).split(" · ")[0].replace(/[%_]/g,"").trim();
    if(clean.length>=2){
      const { data } = await sb.from("purchases").select("*").ilike("customer_name","%"+clean+"%").order("order_date",{ascending:false}).limit(500);
      rows=data||[];
    }
  }
  return rows;
}
function money(n){ return "$"+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0}); }

// --- Likely medical field, inferred from purchased items (heuristic) ---
const FIELD_RULES = [
  {field:"ENT / Otolaryngology", kw:[/nasal/i,/sinus/i,/merocel/i,/rhino/i,/tonsil/i,/myringotom/i,/tympan/i,/laryng/i,/otolog/i,/septal/i,/nasopharyng/i,/\bent\b/i]},
  {field:"Orthopedics", kw:[/orthop/i,/\bbone\b/i,/\bscrew\b/i,/reamer/i,/arthroscop/i,/\bknee\b/i,/\bhip\b/i,/femoral nail/i,/tibial/i,/suture anchor/i,/pedicle/i,/oscillating.*saw/i,/sagittal saw/i,/\bk-?wire/i,/intramedullary/i,/\bplate\b.*\b(screw|bone|fixation)/i]},
  {field:"Cardiology / Cardiovascular", kw:[/cardiac/i,/coronary/i,/angio/i,/\bvalve\b/i,/pacemaker/i,/ablation/i,/hemodynamic/i,/aortic/i,/\bcardio/i,/guidewire/i,/\bballoon\b/i,/\bcannula\b/i,/\bsheath\b/i,/femoral.*venous/i]},
  {field:"GI / Endoscopy", kw:[/endoscop/i,/biliary/i,/colonoscop/i,/gastro/i,/\bercp\b/i,/polypectom/i,/esophag/i,/banding/i,/\bgi\b/i]},
  {field:"General / Laparoscopic Surgery", kw:[/stapler/i,/trocar/i,/laparoscop/i,/\bmesh\b/i,/harmonic/i,/ligasure/i,/endopath/i,/hernia/i,/clip applier/i,/electrosurg/i,/\bligature\b/i,/quick load/i,/knot/i]},
  {field:"Neurosurgery", kw:[/\bcsf\b/i,/\bshunt\b/i,/cranial/i,/\bdura\b/i,/aneurysm/i,/ventricular/i,/\bicp\b/i,/\bneuro/i,/external.*drainage/i]},
  {field:"Anesthesia / Pain", kw:[/epidural/i,/tuohy/i,/spinal needle/i,/anesthesi/i,/nerve block/i,/\bregional\b/i]},
  {field:"Urology", kw:[/ureter/i,/urolog/i,/\bfoley\b/i,/nephro/i,/cystoscop/i,/prostate/i,/lithotrip/i,/double.?j/i,/\bstone\b/i]},
  {field:"OB/GYN", kw:[/obstetr/i,/gynec/i,/uterine/i,/cervical/i,/vaginal/i,/hysteroscop/i,/\bfetal\b/i,/ob\/?gyn/i]},
  {field:"Ophthalmology", kw:[/ophthalm/i,/intraocular/i,/\biol\b/i,/phaco/i,/vitrectom/i,/\bcornea/i,/\bretina/i]},
  {field:"Wound Care / Supplies", kw:[/dressing/i,/\bgauze\b/i,/\bwound\b/i,/bandage/i]},
];
function inferField(rows){
  const scores={}; const signals={};
  (rows||[]).forEach(r=>{
    const txt=(r.item||"")+" "; const w=Math.min(Number(r.qty)||1,5);
    FIELD_RULES.forEach(rule=>{
      if(rule.kw.some(re=>re.test(txt))){
        scores[rule.field]=(scores[rule.field]||0)+w;
        (signals[rule.field]=signals[rule.field]||[]).push((r.item||"").split(/[-–]/)[0].trim().slice(0,46));
      }
    });
  });
  const ranked=Object.keys(scores).map(f=>({field:f,score:scores[f]})).sort((a,b)=>b.score-a.score);
  const total=ranked.reduce((s,x)=>s+x.score,0);
  if(!ranked.length) return null;
  const top=ranked[0], share=total?top.score/total:0;
  const conf= share>=0.6?"strong": share>=0.35?"likely":"mixed";
  return { top:top.field, share, conf, second: ranked[1]?ranked[1].field:null,
           sig:[...new Set(signals[top.field]||[])].slice(0,3) };
}
function renderFieldBanner(rows){
  const f=inferField(rows);
  if(!f) return '';
  const sub = (f.second? "Also seen: "+esc(f.second)+" · ":"") + (f.sig.length? "signals: "+f.sig.map(esc).join(", ") : "");
  return '<div class="fieldbox">🔬 Likely medical field: <b>'+esc(f.top)+'</b>'+
    '<span class="conf '+f.conf+'">'+f.conf+'</span>'+
    (sub?'<div class="fieldsub">'+sub+'</div>':'')+
    '<div class="fieldsub" style="opacity:.8">Best guess from purchase history — verify with the customer.</div></div>';
}

function renderPurchases(rows){
  if(!rows||!rows.length) return '<div style="color:#9aa7b4;font-size:12px">No prior orders found in the history.</div>';
  const groups={};
  rows.forEach(r=>{ const a=r.account||"SurgaMed"; (groups[a]=groups[a]||[]).push(r); });
  let h=renderFieldBanner(rows);
  Object.keys(groups).sort().forEach(acct=>{
    const list=groups[acct]; let total=0,units=0;
    // "price" from dotMed is already the line subtotal (unit price × qty), so sum it directly.
    list.forEach(r=>{ total+=Number(r.price||0); units+=Number(r.qty||1); });
    const col=ACCT_COLOR[acct]||"#5a6b7b";
    h+='<div class="acctblock"><div class="acctttl"><span class="dot" style="background:'+col+'"></span>'+esc(acct)+' <span class="pill">'+list.length+' line item'+(list.length===1?'':'s')+'</span></div>';
    h+='<div class="phsum">'+units+' unit'+(units===1?'':'s')+' · est. '+money(total)+' lifetime</div>';
    h+='<table class="phtab"><thead><tr><th>Date</th><th>Item</th><th>Listing</th><th>Qty</th><th>Price</th></tr></thead><tbody>';
    list.forEach(r=>{ h+='<tr><td>'+esc(r.order_date||"")+'</td><td>'+esc(r.item||"")+'</td><td>'+(r.listing?("#"+esc(String(r.listing))):"")+'</td><td>'+esc(String(r.qty||""))+'</td><td>'+(r.price!=null&&r.price!==""?money(r.price):"")+'</td></tr>'; });
    h+='</tbody></table></div>';
  });
  return h;
}
async function loadCustHistory(l){
  const box=document.getElementById("custBox"); if(!box) return;
  try{ const rows=await getPurchases(l.custEmail,l.display); box.innerHTML=renderPurchases(rows); }
  catch(e){ box.innerHTML='<div style="color:#c0392b;font-size:12px">Couldn’t load history: '+esc(String(e.message||e))+'</div>'; }
}
// Keep the purchase-history DB current: each time the board loads, scan the most
// recent orders and upsert them (idempotent). Covers a few days of new orders.
async function refreshPurchases(){
  try{
    let before=null;
    for(let i=0;i<3;i++){
      const u=FN_URL+"?ingest=orders"+(before?("&before="+encodeURIComponent(before)):"");
      const r=await fetch(u,{headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY}});
      if(!r.ok) break;
      const d=await r.json();
      before=d.nextBefore;
      if(d.done||!before) break;
    }
  }catch(e){ /* silent: history stays at last good state */ }
}
