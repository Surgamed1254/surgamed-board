function renderRepIntel(rows){
  const attr=(rows||[]).filter(r=>r.rep && String(r.rep).trim());
  if(!attr.length) return '';
  const byRep={}, seen={};
  attr.forEach(r=>{
    const rp=r.rep.trim(); const g=byRep[rp]||(byRep[rp]={rep:rp,orders:new Set(),items:{},last:'',rev:0});
    const on=String(r.order_number||r.invoice||('d'+(r.order_date||'')));
    g.orders.add(on);
    const ok=rp+'|'+on; if(!seen[ok] && r.order_total!=null && r.order_total!==''){ seen[ok]=1; g.rev+=Number(r.order_total)||0; }
    const it=(r.item||'').split(/[-–]/)[0].trim().slice(0,46); if(it) g.items[it]=(g.items[it]||0)+(Number(r.qty)||1);
    const d=(r.order_date||'').slice(0,10); if(d>g.last) g.last=d;
  });
  const reps=Object.values(byRep).sort((a,b)=>(b.last||'').localeCompare(a.last||''));

  }else{

    badge='<span style="background:#eaf3fd;color:#0b66c3;border:1px solid #bcd8f5;border-radius:10px;padding:1px 8px;font-weight:700;font-size:11px">🔒 '+esc(lastRep)+' owns this account</span> <span style="color:var(--muted);font-size:11px">'+dl+' day'+(dl===1?'':'s')+' left unless another closed sale resets it</span>';
  }
  let h='<div style="border:1px solid #dbe6f0;background:#f7fbff;border-radius:10px;padding:10px 12px;margin:0 0 12px">';
  h+='<div style="font-size:13px;margin-bottom:4px">🏅 Last sale: <b>'+esc(lastRep)+'</b> · '+esc(lastDate||'—')+'</div>';
  h+='<div style="margin-bottom:6px">'+badge+'</div>';
  h+='<table class="phtab"><thead><tr><th>Rep who closed sales</th><th>Orders</th><th>Last sale</th><th>Revenue</th><th>Top items bought</th></tr></thead><tbody>';

  h+='</tbody></table></div>';
  return h;
}

        pool=pool.concat((data||[]).map(x=>({source:'Medstock',inDate:true,name:x.description||((x.manufacturer||'')+' '+(x.ref||'')).trim(),ref:(x.ref||NK(x.description)),category:x.category,price:null,url:null}))); } }catch(e){}
    pool=pool.filter(x=>x.name&&x.ref&&!er.has(NK(x.ref)));
    const s2={}; pool=pool.filter(x=>{const k=NK(x.name); if(!k||s2[k])return false; s2[k]=1; return true;});

  }catch(e){}

async function callFn(action,payload){
  const { data:{ session } }=await SB.auth.getSession();
  const r=await fetch(MANAGER_FN,{method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+(session&&session.access_token||"")},body:JSON.stringify({action,...payload})});
  const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||("HTTP "+r.status)); return j;
}
function localNote(cu,title,body){ (cu._tl=cu._tl||[]).unshift({type:"note",source:"manager",rep:(STATE.email||"demo"),title,body,ts:new Date().toISOString()}); }
async function mgrAction(cu,action,payload){
  try{
    if(STATE.live){ await callFn(action,{customer_id:cu.id,...payload}); }
    if(action==="assign_rep"){ const rep=STATE.reps.find(r=>r.id===payload.rep_id); cu.assigned_rep=rep?rep.name:""; localNote(cu,"Assigned to "+(rep?rep.name:"unassigned")); }
    if(action==="set_status"){ cu.manager_status=payload.manager_status; localNote(cu,"Status → "+statusName(payload.manager_status)); }
    if(action==="set_priority"){ cu.priority=payload.priority; localNote(cu,"Priority → "+payload.priority); }
    if(action==="set_follow_up"){ cu.follow_up_date=payload.follow_up_date||null; localNote(cu,payload.follow_up_date?"Follow-up set for "+payload.follow_up_date:"Follow-up cleared"); }
    if(action==="set_next_action"){ cu.next_action_override=payload.next_action_override||null; localNote(cu,payload.next_action_override?"Next action: "+payload.next_action_override:"Next action cleared (auto)"); }
    if(action==="toggle_vip"){ cu.vip=payload.vip; localNote(cu,payload.vip?"Marked VIP":"VIP removed"); }
    if(action==="toggle_review"){ cu.review_flag=payload.review_flag; localNote(cu,payload.review_flag?"Flagged for review":"Review flag cleared"); }
    if(action==="add_note"){ localNote(cu,"Internal note",payload.body); }
    toast(STATE.live?"Saved":"Saved (demo)"); renderList(); openCustomer(cu.id,true);
  }catch(e){ toast("⚠ "+e.message); }
}
function wireDetail(cu){
  document.querySelectorAll('[data-act]').forEach(el=>{
    const a=el.dataset.act;
    if(el.tagName==="SELECT"){ el.addEventListener("change",()=>{
      if(a==="assign_rep") mgrAction(cu,"assign_rep",{rep_id:Number(el.value)||null});
      if(a==="set_status") mgrAction(cu,"set_status",{manager_status:el.value});
      if(a==="set_priority") mgrAction(cu,"set_priority",{priority:el.value});
    }); }
    else if(el.tagName==="INPUT" && a==="set_follow_up"){ el.addEventListener("change",()=>mgrAction(cu,"set_follow_up",{follow_up_date:el.value||null})); }
    else if(el.tagName==="INPUT" && a==="set_next_action"){ el.addEventListener("change",()=>mgrAction(cu,"set_next_action",{next_action_override:el.value||null})); }
    else if(a==="vip"){ el.addEventListener("click",()=>mgrAction(cu,"toggle_vip",{vip:!cu.vip})); }
    else if(a==="review"){ el.addEventListener("click",()=>mgrAction(cu,"toggle_review",{review_flag:!cu.review_flag})); }
  });
  const add=$("noteAdd"), inp=$("noteInput");
  if(add) add.addEventListener("click",()=>{ const v=(inp.value||"").trim(); if(!v) return; inp.value=""; mgrAction(cu,"add_note",{body:v}); });
  if(inp) inp.addEventListener("keydown",e=>{ if(e.key==="Enter") add.click(); });
  const sb2=$("sendBtn"); if(sb2) sb2.addEventListener("click",()=>sendReply(cu));
}

async function openCustomer(cid,keep){
  OPEN=cid;
  document.querySelectorAll(".row").forEach(e=>e.classList.toggle("active",Number(e.dataset.cid)===cid));
  const cu=STATE.customers.find(c=>c.id===cid); if(!cu) return;
  let msgs=cu._msgs, tl=cu._tl;
  if(SB && STATE.live){
    if(cu._convId!==null){ const m=await SB.from("messages").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts"); msgs=m.data||[]; } else msgs=[];
    const t=await SB.from("timeline_events").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts",{ascending:false}); tl=t.data||[];
    cu._msgs=msgs; cu._tl=tl;
  }
  const isTest=/ZZ_WATEST/i.test(cu.name||"");
  $("detail").innerHTML=detailHtml(cu,msgs,tl,isTest); wireDetail(cu); initCollapsibles($("detail"),"h3.sec");
  (function(){ try{ var ids=[].slice.call(document.querySelectorAll(".row")).map(function(e){return Number(e.dataset.cid);}); var idx=ids.indexOf(cid); var pv=idx>0?ids[idx-1]:null, nx=(idx>=0&&idx<ids.length-1)?ids[idx+1]:null; var nav=document.createElement("div"); nav.style.cssText="display:flex;gap:8px;justify-content:space-between;margin-bottom:8px"; nav.innerHTML='<button class="btn ghost sm" id="cPrev">\u2039 Prev</button><button class="btn ghost sm" id="cNext">Next \u203a</button>'; var dt=$("detail"); dt.insertBefore(nav, dt.firstChild); var pb=document.getElementById("cPrev"), nb=document.getElementById("cNext"); if(pb){ if(pv){ pb.onclick=function(){openCustomer(pv);}; } else { pb.disabled=true; pb.style.opacity=.4; } } if(nb){ if(nx){ nb.onclick=function(){openCustomer(nx);}; } else { nb.disabled=true; nb.style.opacity=.4; } } }catch(e){} })();
  // load the heavy sections (email / shipping / orders)
  loadEmailThread(cu); loadShipping(cu); loadPurchases(cu);
}
function deepLink(){ const m=(location.hash||"").match(/customer=(\d+)/); return m?Number(m[1]):null; }

// ---------- manager KPI workspace ----------
function renderWorkspace(){
  const cs=STATE.customers;
  const byStatus={}; STATUSES.forEach(s=>byStatus[s[0]]=0);
  cs.forEach(c=>{ const s=c.manager_status||"new"; byStatus[s]=(byStatus[s]||0)+1; });
  const total=cs.length, won=(byStatus.won||0)+(byStatus.closed||0);
  const open=cs.filter(c=>!["won","lost","closed"].includes(c.manager_status)).length;
  const due=cs.filter(dueSoon).length, vip=cs.filter(c=>c.vip).length, review=cs.filter(c=>c.review_flag).length, unassigned=cs.filter(c=>!c.assigned_rep).length;
  const conv=total?Math.round(won/total*100):0;
  const kpi=(lab,val,cls)=>'<div class="ws-kpi'+(cls?' '+cls:'')+'"><div class="lab">'+lab+'</div><div class="val">'+val+'</div></div>';
  let html='<div class="ws-kpis">'+
    kpi('Customers',total)+kpi('Open',open,'blue')+kpi('Won',won,'green')+kpi('Conversion',conv+'%')+
    kpi('Due now',due,'amber')+kpi('Unassigned',unassigned,'red')+kpi('VIP',vip)+kpi('Flagged',review)+'</div>';
  const maxStage=Math.max(1,...STATUSES.map(s=>byStatus[s[0]]||0));
  let pipe='<div class="ws-card"><h3>Pipeline by stage</h3>';
  STATUSES.forEach(s=>{ const c=byStatus[s[0]]||0, w=Math.round(c/maxStage*100);
    pipe+='<div class="ws-stage" data-wsstage="'+s[0]+'" title="Filter to '+esc(s[1])+'"><span class="nm">'+esc(s[1])+'</span><span class="bar"><i style="width:'+w+'%;background:'+(STATUS_COLOR[s[0]]||'#185fa5')+'"></i></span><span class="ct">'+c+'</span></div>'; });
  pipe+='<div class="ws-cap">Click a stage to open that filtered list.</div></div>';
  const reps=STATE.reps.map(r=>{ const ls=cs.filter(c=>c.assigned_rep===r.name); return {r:r.name,total:ls.length,open:ls.filter(c=>!["won","lost","closed"].includes(c.manager_status)).length,won:ls.filter(c=>["won","closed"].includes(c.manager_status)).length,due:ls.filter(dueSoon).length}; });
  reps.sort((a,b)=>b.total-a.total);
  let rept='<div class="ws-card"><h3>Rep performance</h3><table class="ws-reptab"><thead><tr><th>Rep</th><th>Customers</th><th>Open</th><th>Won</th><th>Due</th></tr></thead><tbody>';
  reps.forEach(p=>{ rept+='<tr data-wsrep="'+esc(p.r)+'" title="Filter to '+esc(p.r)+'"><td><b>'+esc(p.r)+'</b></td><td>'+p.total+'</td><td>'+p.open+'</td><td style="color:var(--green)">'+p.won+'</td><td style="color:var(--amber)">'+p.due+'</td></tr>'; });
  const un=cs.filter(c=>!c.assigned_rep).length; rept+='<tr data-wsrep="__none"><td><b>Unassigned</b></td><td>'+un+'</td><td>'+un+'</td><td>0</td><td>'+cs.filter(c=>!c.assigned_rep&&dueSoon(c)).length+'</td></tr>';
  rept+='</tbody></table><div class="ws-cap">Click a rep to open their filtered customer list.</div></div>';
  html+='<div class="ws-grid">'+pipe+rept+'</div>';
  $("ws").innerHTML=html;
  document.querySelectorAll('#ws [data-wsstage]').forEach(el=>el.onclick=()=>{ FILTERS.status=el.getAttribute('data-wsstage'); $("fStatus").value=FILTERS.status; setWsView(false); renderList(); });
  document.querySelectorAll('#ws [data-wsrep]').forEach(el=>el.onclick=()=>{ FILTERS.rep=el.getAttribute('data-wsrep'); $("fRep").value=FILTERS.rep; setWsView(false); renderList(); });
}
function setWsView(on){ WSVIEW=on; $("wsToggle").classList.toggle("on",on); $("wsToggle").textContent=on?"👥 Customers":"📊 Workspace"; if(on){ renderWorkspace(); } showApp(); }

async function loadLive(){
  const reps=await SB.from("reps").select("id,name").is("deleted_at",null).order("id"); STATE.reps=reps.data||[];
  const cr=await SB.from("customers")
    .select("id,name,company,phone,email,assigned_rep,vip,review_flag,country,preferred_language,last_contact_at,manager_status,priority,next_action_override,follow_up_date")
    .is("deleted_at",null).order("last_contact_at",{ascending:false,nullsFirst:false}).limit(500);
  const custs=cr.data||[];
  const conv=await SB.from("wa_conversations").select("customer_id").is("deleted_at",null);
  const waSet=new Set((conv.data||[]).map(x=>x.customer_id));
  const tl=await SB.from("timeline_events").select("customer_id,source,type").is("deleted_at",null).order("ts",{ascending:false}).limit(4000);
  const badgeMap={};
  (tl.data||[]).forEach(e=>{ const b=badgeFor(e); if(!b) return; (badgeMap[e.customer_id]=badgeMap[e.customer_id]||new Set()).add(b); });
  custs.forEach(c=>{ const set=badgeMap[c.id]||new Set(); if(waSet.has(c.id)) set.add("WhatsApp"); c._badges=[...set]; c._convId=waSet.has(c.id)?1:null; c._msgs=null; c._tl=null; });
  STATE.customers=custs;
  fillFilterSelects(); renderList(); if(WSVIEW) renderWorkspace();
  const dl=deepLink(); if(dl) openCustomer(dl);
}
function wireFilters(){
  $("q").addEventListener("input",e=>{ FILTERS.q=e.target.value; renderList(); });
  $("fSource").addEventListener("change",e=>{ FILTERS.source=e.target.value; renderList(); });
  $("fRep").addEventListener("change",e=>{ FILTERS.rep=e.target.value; renderList(); });
  $("fStatus").addEventListener("change",e=>{ FILTERS.status=e.target.value; renderList(); });
  $("fPriority").addEventListener("change",e=>{ FILTERS.priority=e.target.value; renderList(); });
  document.querySelectorAll(".chip[data-flag]").forEach(ch=>ch.addEventListener("click",()=>{ const f=ch.dataset.flag; FILTERS[f]=!FILTERS[f]; ch.classList.toggle("on",FILTERS[f]); renderList(); }));
  $("wsToggle").addEventListener("click",()=>setWsView(!WSVIEW));
  $("refreshBtn").addEventListener("click",async()=>{ if(STATE.live){ $("refreshBtn").textContent="↻ …"; await loadLive(); $("refreshBtn").textContent="↻ Refresh"; toast("Refreshed"); } });
}
async function boot(){
  wireFilters();
  const demo=/[?&]demo=1/.test(location.search);
  if(demo || typeof supabase==="undefined"){ setMode(false); STATE.reps=DEMO_REPS; STATE.customers=DEMO_CUST; STATE.email="demo@surgamed.com"; fillFilterSelects(); showApp(); renderList(); const dl=deepLink(); if(dl) openCustomer(dl); return; }
  SB=supabase.createClient(SB_URL,SB_KEY); setMode(true);
  const { data:{ session } }=await SB.auth.getSession();
  if(!session){ showGate(`<h2>SurgaMed CRM — Managers only</h2><p class="who">Sign in with your SurgaMed Microsoft account.</p><p><button class="btn" id="si2">Sign in with Microsoft</button></p><p class="who">Or open <a href="?demo=1">demo mode</a>.</p>`);
    $("si2").addEventListener("click",()=>SB.auth.signInWithOAuth({provider:"azure",options:{redirectTo:location.href}})); return; }
  const email=(session.user.email||"").toLowerCase(); STATE.email=email; $("who").textContent=email;
  if(!MANAGERS.includes(email)){ showGate(`<h2>Managers only</h2><p class="who">${esc(email)} doesn't have access. Ask an admin.</p>`); return; }
  showApp(); await loadLive();
}
if(typeof document!=="undefined" && document.getElementById("app")) boot();
if(typeof window!=="undefined") window.__crm={statusLabel,nextAction,matchesFilters,dueSoon,naClass,statusName,badgeFor,cleanName,dispName,renderEmailList,renderShipping,renderPurchases};
</script>
