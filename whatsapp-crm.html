<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SurgaMed · CRM</title>
<style>
  :root{--bg:#f4f6f9;--panel:#fff;--ink:#1d2733;--muted:#647387;--line:#e3e8ef;--blue:#185fa5;--blueS:#e8f1fb;--green:#1b9e6b;--greenS:#e6f6ee;--amber:#b7791f;--amberS:#fdf3e2;--red:#c0392b;--redS:#fdecea;--purple:#6b46c1;--purpleS:#efe9fb;--teal:#0f766e;--tealS:#d9f2ee;--shadow:0 1px 3px rgba(16,24,40,.1)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header.top{background:var(--panel);border-bottom:1px solid var(--line);padding:9px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
  .brand{font-weight:700;font-size:15px;color:var(--blue)}
  .badge{font-size:11px;font-weight:600;border-radius:999px;padding:2px 10px}
  .badge.live{background:var(--greenS);color:var(--green)}
  .badge.demo{background:var(--amberS);color:var(--amber)}
  .spacer{flex:1}
  .who{color:var(--muted);font-size:12px}
  .btn{border:none;border-radius:7px;padding:7px 13px;font:13px inherit;font-weight:600;cursor:pointer;background:var(--blue);color:#fff}
  .btn.sm{padding:4px 9px;font-size:12px}
  .gate{max-width:560px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;text-align:center;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 8px}
  .wrap{display:grid;grid-template-columns:380px 1fr;gap:0;height:calc(100vh - 48px)}
  .list{border-right:1px solid var(--line);background:#fff;overflow:auto;display:flex;flex-direction:column}
  .filters{padding:9px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5}
  .filters input[type=search]{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font:13px inherit;margin-bottom:7px}
  .frow{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .frow select{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font:11.5px inherit;background:#fff;color:var(--ink)}
  .chip{font-size:11px;font-weight:600;border:1px solid var(--line);border-radius:999px;padding:3px 9px;cursor:pointer;background:#fff;color:var(--muted);user-select:none}
  .chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .lcount{padding:6px 13px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line)}
  .rows{flex:1}
  .row{padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .row:hover{background:#f8fafc}
  .row.active{background:var(--blueS)}
  .row .nm{font-weight:600;display:flex;align-items:center;gap:6px}
  .row .sub{color:var(--muted);font-size:11.5px;margin-top:2px}
  .row .r2{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .src{display:inline-block;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px;letter-spacing:.2px}
  .src.WhatsApp{background:var(--greenS);color:var(--green)} .src.Email{background:var(--blueS);color:var(--blue)}
  .src.DOTmed{background:var(--purpleS);color:var(--purple)} .src.Shipping{background:var(--amberS);color:var(--amber)} .src.PayPal{background:var(--tealS);color:var(--teal)}
  .pill{display:inline-block;font-size:10.5px;font-weight:600;border-radius:999px;padding:1px 8px}
  .pill.follow{background:var(--amberS);color:var(--amber)}
  .pill.new{background:var(--blueS);color:var(--blue)} .pill.in_progress{background:#eaf2ff;color:#2563eb}
  .pill.quoted{background:var(--purpleS);color:var(--purple)} .pill.awaiting_customer{background:#eef1f5;color:var(--muted)}
  .pill.won{background:var(--greenS);color:var(--green)} .pill.lost{background:var(--redS);color:var(--red)} .pill.closed{background:var(--greenS);color:var(--green)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.urgent{background:var(--red)} .dot.high{background:var(--amber)} .dot.normal{background:#9aa6b5} .dot.low{background:#cbd5e1}
  .star{color:#d8a800;font-weight:700} .flagx{color:var(--red);font-weight:700}
  .detail{overflow:auto;padding:16px 20px}
  .empty{color:var(--muted);text-align:center;margin-top:80px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:13px}
  .pname{font-size:18px;font-weight:700;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .iconbtn{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:600;color:var(--muted)}
  .iconbtn.on.vip{background:#fff7df;color:#b8860b;border-color:#ecd98a}
  .iconbtn.on.rev{background:var(--redS);color:var(--red);border-color:#f0b6b6}
  .meta{display:flex;flex-wrap:wrap;gap:13px;margin-top:9px;color:var(--muted);font-size:12px}
  .meta b{color:var(--ink)}
  .ctrls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:4px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px}
  .field select,.field input{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font:13px inherit;background:#fff;color:var(--ink)}
  .na{font-weight:700;border-radius:7px;padding:3px 10px;display:inline-block}
  .na.reply{background:var(--redS);color:var(--red)} .na.follow{background:var(--amberS);color:var(--amber)} .na.wait{background:#eef1f5;color:var(--muted)} .na.none{background:var(--greenS);color:var(--green)}
  h3.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 2px 8px}
  .msgs{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
  .msg{max-width:72%;padding:7px 11px;border-radius:12px;margin:6px 0;font-size:13px;clear:both}
  .msg.in{background:#eef2f6;float:left;border-bottom-left-radius:3px}
  .msg.out{background:var(--blueS);float:right;border-bottom-right-radius:3px}
  .msg .t{font-size:10px;color:var(--muted);margin-top:3px}
  .clear{clear:both}
  .notes{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:10px 12px}
  .note{padding:7px 0;border-bottom:1px dashed var(--line)} .note:last-child{border-bottom:none}
  .note .who{font-weight:600;color:var(--ink)}
  .noteadd{display:flex;gap:7px;margin-top:9px} .noteadd input{flex:1;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font:13px inherit}
  .tl{list-style:none;margin:0;padding:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  .tl li{padding:8px 13px;border-bottom:1px dashed var(--line);display:flex;gap:9px} .tl li:last-child{border-bottom:none}
  .tl .ic{font-size:14px;width:18px;text-align:center} .tl .ty{font-weight:600} .tl .t{font-size:11px;color:var(--muted)}
  .test-banner{background:var(--amberS);color:var(--amber);border:1px solid #f0dcb3;border-radius:8px;padding:6px 12px;font-size:12px;margin:0 0 12px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1d2733;color:#fff;padding:8px 16px;border-radius:8px;font-size:12.5px;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;z-index:50}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header class="top">
  <span class="brand">SurgaMed · CRM</span>
  <span id="mode" class="badge demo">DEMO</span>
  <span class="spacer"></span>
  <span class="who" id="who"></span>
</header>
<div id="gate" class="gate" style="display:none"></div>
<div id="app" class="wrap" style="display:none">
  <div class="list">
    <div class="filters">
      <input type="search" id="q" placeholder="Search name, company, phone, email…" autocomplete="off"/>
      <div class="frow">
        <select id="fSource"><option value="">All sources</option><option>WhatsApp</option><option>Email</option><option>DOTmed</option><option>Shipping</option><option>PayPal</option></select>
        <select id="fRep"><option value="">All reps</option></select>
        <select id="fStatus"><option value="">Any status</option></select>
        <select id="fPriority"><option value="">Any priority</option></select>
        <span class="chip" data-flag="vip">★ VIP</span>
        <span class="chip" data-flag="review">⚑ Review</span>
        <span class="chip" data-flag="due">⏰ Due</span>
      </div>
    </div>
    <div class="lcount" id="lcount">—</div>
    <div class="rows" id="rows"></div>
  </div>
  <div class="detail" id="detail"><div class="empty">Select a customer to view their profile, manager controls, conversation and timeline.</div></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://ecjemcrpbzeocoiwslcu.supabase.co";
const SB_KEY="sb_publishable_GhYb1dkRQKdH5oimsnhaYA_A8QYT3Yq";
const MANAGER_FN=SB_URL+"/functions/v1/manager";
const MANAGERS=["mweinreb@surgamed.com","sgluck@surgamed.com","orders@surgamed.com"];
const STATUSES=[["new","New"],["in_progress","In progress"],["quoted","Quoted"],["awaiting_customer","Awaiting customer"],["won","Won"],["lost","Lost"],["closed","Closed"]];
const PRIORITIES=[["urgent","Urgent"],["high","High"],["normal","Normal"],["low","Low"]];
const statusName=s=>(STATUSES.find(x=>x[0]===s)||[,s||"New"])[1];
const TLICON={whatsapp_in:"💬",whatsapp_out:"📤",customer_created:"✨",note:"📝",order:"📦",payment:"💳",shipment:"🚚",email:"✉️",dotmed:"🩺",ai_summary:"🤖"};
// map a timeline event (source/type) to a source badge
function badgeFor(ev){ const s=(ev.source||"").toLowerCase(), t=(ev.type||"").toLowerCase();
  if(s==="whatsapp"||t.startsWith("whatsapp")) return "WhatsApp";
  if(s==="dotmed"||t==="dotmed") return "DOTmed";
  if(s==="outlook"||t==="email") return "Email";
  if(s==="shipstation"||t==="shipment") return "Shipping";
  if(s==="paypal"||t==="payment"||t==="order") return "PayPal";
  return null; }

// ---------- pure helpers ----------
function fmtAgo(t){ if(!t) return "—"; const d=new Date(t),h=(Date.now()-d.getTime())/3.6e6; if(h<1) return Math.max(1,Math.round(h*60))+"m ago"; if(h<24) return Math.round(h)+"h ago"; return Math.round(h/24)+"d ago"; }
function fmtDate(t){ if(!t) return "—"; return new Date(t).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function lastMsg(msgs){ return msgs&&msgs.length?msgs[msgs.length-1]:null; }
function dueSoon(cu){ if(!cu.follow_up_date) return false; return new Date(cu.follow_up_date+"T23:59:59").getTime()<=Date.now(); }
function statusLabel(cu){ return statusName(cu.manager_status||"new"); }
function statusClass(cu){ const s=cu.manager_status||"new"; return ["new","in_progress","quoted","awaiting_customer","won","lost","closed"].includes(s)?s:"new"; }
function nextAction(cu,msgs){
  if(cu.next_action_override) return cu.next_action_override;
  if(["won","lost","closed"].includes(cu.manager_status)) return "No action";
  const l=lastMsg(msgs); if(l&&l.direction==="in") return "Reply to WhatsApp";
  if(dueSoon(cu)) return "Follow up (due)";
  if(cu.follow_up_date) return "Follow Up";
  return "Waiting on Customer";
}
function naClass(a){ return /reply/i.test(a)?"reply":/follow/i.test(a)?"follow":/no action/i.test(a)?"none":"wait"; }
function cleanName(s){ return String(s==null?'':s).replace(/&#x?[0-9a-fA-F]+;/g,'').replace(/[\u0000-\u001F]+/g,' ').replace(/\uFFFD+/g,'').replace(/\s+/g,' ').trim(); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function matchesFilters(cu,f){
  if(f.q){ const blob=(cu.name+" "+cu.company+" "+cu.phone+" "+cu.email+" "+cu.assigned_rep).toLowerCase(); if(!blob.includes(f.q.toLowerCase())) return false; }
  if(f.source && !(cu._badges||[]).includes(f.source)) return false;
  if(f.rep){ if(f.rep==="__none"){ if(cu.assigned_rep) return false; } else if(cu.assigned_rep!==f.rep) return false; }
  if(f.status && (cu.manager_status||"new")!==f.status) return false;
  if(f.priority && (cu.priority||"normal")!==f.priority) return false;
  if(f.vip && !cu.vip) return false;
  if(f.review && !cu.review_flag) return false;
  if(f.due && !dueSoon(cu)) return false;
  return true;
}

// ---------- demo data ----------
function iso(min){ return new Date(Date.now()-min*6e4).toISOString(); }
const DEMO_REPS=[{id:1,name:"Jennifer"},{id:2,name:"Mirian"},{id:3,name:"Deysi"},{id:4,name:"Tehila"},{id:5,name:"Main Office"}];
const DEMO_CUST=[
  {id:8001,name:"ZZ_WATEST — Dr. Demo Buyer",company:"Demo General Hospital",phone:"+19999990001",email:"demo.buyer@example.com",assigned_rep:"Deysi",vip:true,review_flag:false,country:"US",preferred_language:"en",last_contact_at:iso(12),manager_status:"quoted",priority:"high",follow_up_date:null,next_action_override:null,_convId:9001,_badges:["WhatsApp"],
   _msgs:[{direction:"in",text:"Hi, do you have the Hologic Selenia in stock?",ts:iso(40)},{direction:"out",text:"Yes — sending you the quote now.",ts:iso(30)},{direction:"in",text:"Great, what's the lead time?",ts:iso(12)}],
   _tl:[{type:"whatsapp_in",source:"whatsapp",title:"WhatsApp from Dr. Demo Buyer",ts:iso(40)},{type:"note",source:"manager",rep:"sgluck",title:"Quoted $48k — chasing PO",ts:iso(28)}]},
  {id:8101,name:"Hai Nguyen",company:"Treat Veterinary Surgery",phone:"",email:"treatveterinarysurgeryservice@gmail.com",assigned_rep:"",vip:false,review_flag:false,country:"US",preferred_language:"en",last_contact_at:iso(90),manager_status:"new",priority:"normal",follow_up_date:null,next_action_override:null,_convId:null,_badges:["DOTmed","Email"],
   _msgs:[],_tl:[{type:"dotmed",source:"dotmed",title:"DOTmed Listing #5718019 Disposables",ts:iso(90)},{type:"customer_created",source:"outlook",title:"Customer created from email",ts:iso(91)}]},
  {id:8102,name:"Scott Rose",company:"",phone:"",email:"scottrose0202@msn.com",assigned_rep:"Mirian",vip:false,review_flag:true,country:"US",preferred_language:"en",last_contact_at:iso(300),manager_status:"in_progress",priority:"urgent",follow_up_date:new Date(Date.now()-864e5).toISOString().slice(0,10),next_action_override:null,_convId:null,_badges:["Email"],
   _msgs:[],_tl:[{type:"email",source:"outlook",title:"Order status inquiry",body:"Following up on my order…",ts:iso(300)}]},
  {id:8103,name:"Patel Orthopedics",company:"Patel Orthopedics",phone:"+19999990004",email:"aria@patelortho.example",assigned_rep:"Jennifer",vip:true,review_flag:false,country:"US",preferred_language:"en",last_contact_at:iso(2880),manager_status:"won",priority:"low",follow_up_date:null,next_action_override:null,_convId:9004,_badges:["WhatsApp","PayPal","Shipping"],
   _msgs:[{direction:"in",text:"Order received, thank you!",ts:iso(2900)}],_tl:[{type:"order",source:"paypal",title:"Order #SM-10231 paid — $12,400",ts:iso(3000)},{type:"shipment",source:"shipstation",title:"Shipped via UPS 1Z…",ts:iso(2950)}]}
];

// ---------- runtime ----------
const $=id=>document.getElementById(id);
let SB=null, STATE={customers:[],reps:[],live:false,email:""}, FILTERS={q:"",source:"",rep:"",status:"",priority:"",vip:false,review:false,due:false}, OPEN=null;
function setMode(live){ const m=$("mode"); STATE.live=live; m.textContent=live?"LIVE":"DEMO"; m.className="badge "+(live?"live":"demo"); }
function showApp(){ $("gate").style.display="none"; $("app").style.display="grid"; }
function showGate(html){ $("app").style.display="none"; $("gate").style.display="block"; $("gate").innerHTML=html; }
function toast(t){ const e=$("toast"); e.textContent=t; e.classList.add("show"); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove("show"),1900); }

function fillFilterSelects(){
  $("fStatus").innerHTML='<option value="">Any status</option>'+STATUSES.map(s=>`<option value="${s[0]}">${s[1]}</option>`).join("");
  $("fPriority").innerHTML='<option value="">Any priority</option>'+PRIORITIES.map(p=>`<option value="${p[0]}">${p[1]}</option>`).join("");
  $("fRep").innerHTML='<option value="">All reps</option><option value="__none">Unassigned</option>'+STATE.reps.map(r=>`<option>${esc(r.name)}</option>`).join("");
}
function badgesHtml(b){ return (b||[]).map(x=>`<span class="src ${x}">${x}</span>`).join(" "); }
function rowHtml(cu){
  const vip=cu.vip?'<span class="star" title="VIP">★</span>':"", rev=cu.review_flag?'<span class="flagx" title="Review">⚑</span>':"";
  const due=dueSoon(cu)?'<span class="pill follow">⏰ '+fmtDate(cu.follow_up_date)+'</span>':"";
  return `<div class="row" data-cid="${cu.id}">
    <div class="nm">${esc(cleanName(cu.name)||cu.email||("Customer #"+cu.id))} ${vip} ${rev}</div>
    <div class="sub">${esc(cu.assigned_rep||"Unassigned")} · ${esc(cu.company||cu.email||cu.phone||"")}</div>
    <div class="r2">${badgesHtml(cu._badges)} <span class="dot ${cu.priority||'normal'}" title="Priority"></span><span class="pill ${statusClass(cu)}">${esc(statusLabel(cu))}</span> ${due} <span class="sub">${fmtAgo(cu.last_contact_at)}</span></div>
  </div>`;
}
function renderList(){
  const rows=STATE.customers.filter(c=>matchesFilters(c,FILTERS));
  $("rows").innerHTML=rows.map(rowHtml).join("")||'<div class="empty" style="margin:30px">No customers match.</div>';
  $("lcount").textContent=rows.length+" of "+STATE.customers.length+" customers";
  document.querySelectorAll(".row").forEach(el=>{ el.classList.toggle("active",Number(el.dataset.cid)===OPEN); el.addEventListener("click",()=>openCustomer(Number(el.dataset.cid))); });
}

function detailHtml(cu, msgs, timeline, isTest){
  const na=nextAction(cu,msgs);
  const banner=isTest?'<div class="test-banner">⚠ TEST customer — safe demo/QA row.</div>':"";
  const repOpts='<option value="">Unassigned</option>'+STATE.reps.map(r=>`<option value="${r.id}" ${cu.assigned_rep===r.name?"selected":""}>${esc(r.name)}</option>`).join("");
  const statusOpts=STATUSES.map(s=>`<option value="${s[0]}" ${(cu.manager_status||"new")===s[0]?"selected":""}>${s[1]}</option>`).join("");
  const prioOpts=PRIORITIES.map(p=>`<option value="${p[0]}" ${(cu.priority||"normal")===p[0]?"selected":""}>${p[1]}</option>`).join("");
  const mhtml=(msgs||[]).map(m=>`<div class="msg ${m.direction==="in"?"in":"out"}">${esc(m.text||"["+(m.media_type||"message")+"]")}<div class="t">${m.direction==="in"?"Customer":"Rep"} · ${fmtAgo(m.ts)}</div></div>`).join("")+'<div class="clear"></div>';
  const notes=(timeline||[]).filter(e=>e.type==="note");
  const nhtml=notes.map(e=>`<div class="note"><span class="who">${esc((e.rep||"manager").split("@")[0])}</span> · <span class="t">${fmtAgo(e.ts)}</span><div>${esc(e.title||"")}${e.body?" — "+esc(e.body):""}</div></div>`).join("")||'<div class="t">No internal notes yet.</div>';
  const thtml=(timeline||[]).map(e=>`<li><span class="ic">${TLICON[e.type]||"•"}</span><div><span class="ty">${esc(e.title||e.type)}</span>${e.body?" — "+esc(e.body):""}<div class="t">${esc(e.type)} · ${esc(e.source||"")} · ${fmtAgo(e.ts)}</div></div></li>`).join("");
  const convSection = cu._convId
    ? `<h3 class="sec">WhatsApp conversation</h3><div class="msgs">${mhtml||'<div class="empty" style="margin:20px">No messages.</div>'}</div>`
    : `<h3 class="sec">Conversation</h3><div class="msgs"><div class="t">No WhatsApp conversation — this customer came from ${esc((cu._badges||["email"]).join(", "))}. See timeline below.</div></div>`;
  return `${banner}
  <div class="pcard">
    <div class="pname">${esc(cleanName(cu.name)||cu.email||("Customer #"+cu.id))} ${badgesHtml(cu._badges)}
      <span class="iconbtn vip ${cu.vip?"on":""}" data-act="vip">★ VIP</span>
      <span class="iconbtn rev ${cu.review_flag?"on":""}" data-act="review">⚑ Review</span>
    </div>
    <div class="meta">
      <span><b>Email:</b> ${esc(cu.email||"—")}</span><span><b>Phone:</b> ${esc(cu.phone||"—")}</span>
      <span><b>Company:</b> ${esc(cu.company||"—")}</span><span><b>Country:</b> ${esc(cu.country||"—")}</span>
      <span><b>Last activity:</b> ${fmtAgo(cu.last_contact_at)}</span>
    </div>
  </div>
  <div class="pcard"><div class="ctrls">
    <div class="field"><label>Assigned rep</label><select data-act="assign_rep">${repOpts}</select></div>
    <div class="field"><label>Status</label><select data-act="set_status">${statusOpts}</select></div>
    <div class="field"><label>Priority</label><select data-act="set_priority">${prioOpts}</select></div>
    <div class="field"><label>Follow-up date</label><input type="date" data-act="set_follow_up" value="${cu.follow_up_date||""}"/></div>
    <div class="field"><label>Next action (auto: ${esc(na)})</label><input type="text" data-act="set_next_action" placeholder="Override…" value="${esc(cu.next_action_override||"")}"/></div>
    <div class="field"><label>Current next action</label><div><span class="na ${naClass(na)}">${esc(na)}</span></div></div>
  </div></div>
  <h3 class="sec">Internal notes (managers only)</h3>
  <div class="notes"><div id="noteList">${nhtml}</div>
    <div class="noteadd"><input type="text" id="noteInput" placeholder="Add an internal note…"/><button class="btn sm" id="noteAdd">Add</button></div></div>
  ${convSection}
  <h3 class="sec">Timeline</h3>
  <ul class="tl">${thtml||'<li>No timeline events.</li>'}</ul>`;
}

async function callFn(action,payload){
  const { data:{ session } }=await SB.auth.getSession();
  const r=await fetch(MANAGER_FN,{method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+(session&&session.access_token||"")},body:JSON.stringify({action,...payload})});
  const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||("HTTP "+r.status)); return j;
}
function localNote(cu,title,body){ (cu._tl=cu._tl||[]).unshift({type:"note",source:"manager",rep:(STATE.email||"demo"),title,body,ts:new Date().toISOString()}); }
async function mgrAction(cu,action,payload){
  try{
    if(STATE.live){ await callFn(action,{customer_id:cu.id,...payload}); }
    if(action==="assign_rep"){ const rep=STATE.reps.find(r=>r.id===payload.rep_id); cu.assigned_rep=rep?rep.name:""; localNote(cu,"Assigned to "+(rep?rep.name:"unassigned")); }
    if(action==="set_status"){ cu.manager_status=payload.manager_status; localNote(cu,"Status → "+statusName(payload.manager_status)); }
    if(action==="set_priority"){ cu.priority=payload.priority; localNote(cu,"Priority → "+payload.priority); }
    if(action==="set_follow_up"){ cu.follow_up_date=payload.follow_up_date||null; localNote(cu,payload.follow_up_date?"Follow-up set for "+payload.follow_up_date:"Follow-up cleared"); }
    if(action==="set_next_action"){ cu.next_action_override=payload.next_action_override||null; localNote(cu,payload.next_action_override?"Next action: "+payload.next_action_override:"Next action cleared (auto)"); }
    if(action==="toggle_vip"){ cu.vip=payload.vip; localNote(cu,payload.vip?"Marked VIP":"VIP removed"); }
    if(action==="toggle_review"){ cu.review_flag=payload.review_flag; localNote(cu,payload.review_flag?"Flagged for review":"Review flag cleared"); }
    if(action==="add_note"){ localNote(cu,"Internal note",payload.body); }
    toast(STATE.live?"Saved":"Saved (demo)"); renderList(); openCustomer(cu.id,true);
  }catch(e){ toast("⚠ "+e.message); }
}
function wireDetail(cu){
  document.querySelectorAll('[data-act]').forEach(el=>{
    const a=el.dataset.act;
    if(el.tagName==="SELECT"){ el.addEventListener("change",()=>{
      if(a==="assign_rep") mgrAction(cu,"assign_rep",{rep_id:Number(el.value)||null});
      if(a==="set_status") mgrAction(cu,"set_status",{manager_status:el.value});
      if(a==="set_priority") mgrAction(cu,"set_priority",{priority:el.value});
    }); }
    else if(el.tagName==="INPUT" && a==="set_follow_up"){ el.addEventListener("change",()=>mgrAction(cu,"set_follow_up",{follow_up_date:el.value||null})); }
    else if(el.tagName==="INPUT" && a==="set_next_action"){ el.addEventListener("change",()=>mgrAction(cu,"set_next_action",{next_action_override:el.value||null})); }
    else if(a==="vip"){ el.addEventListener("click",()=>mgrAction(cu,"toggle_vip",{vip:!cu.vip})); }
    else if(a==="review"){ el.addEventListener("click",()=>mgrAction(cu,"toggle_review",{review_flag:!cu.review_flag})); }
  });
  const add=$("noteAdd"), inp=$("noteInput");
  if(add) add.addEventListener("click",()=>{ const v=(inp.value||"").trim(); if(!v) return; inp.value=""; mgrAction(cu,"add_note",{body:v}); });
  if(inp) inp.addEventListener("keydown",e=>{ if(e.key==="Enter") add.click(); });
}

async function openCustomer(cid,keep){
  OPEN=cid;
  document.querySelectorAll(".row").forEach(e=>e.classList.toggle("active",Number(e.dataset.cid)===cid));
  const cu=STATE.customers.find(c=>c.id===cid); if(!cu) return;
  let msgs=cu._msgs, tl=cu._tl;
  if(SB && STATE.live){
    if(cu._convId!==null){ const m=await SB.from("messages").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts"); msgs=m.data||[]; } else msgs=[];
    const t=await SB.from("timeline_events").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts",{ascending:false}); tl=t.data||[];
    cu._msgs=msgs; cu._tl=tl;
  }
  const isTest=/ZZ_WATEST/i.test(cu.name||"");
  $("detail").innerHTML=detailHtml(cu,msgs,tl,isTest); wireDetail(cu);
}
function deepLink(){ const m=(location.hash||"").match(/customer=(\d+)/); return m?Number(m[1]):null; }

async function loadLive(){
  const reps=await SB.from("reps").select("id,name").is("deleted_at",null).order("id"); STATE.reps=reps.data||[];
  const cr=await SB.from("customers")
    .select("id,name,company,phone,email,assigned_rep,vip,review_flag,country,preferred_language,last_contact_at,manager_status,priority,next_action_override,follow_up_date")
    .is("deleted_at",null).order("last_contact_at",{ascending:false,nullsFirst:false}).limit(500);
  const custs=cr.data||[];
  // source badges + which customers have a WhatsApp conversation
  const conv=await SB.from("wa_conversations").select("customer_id").is("deleted_at",null);
  const waSet=new Set((conv.data||[]).map(x=>x.customer_id));
  const tl=await SB.from("timeline_events").select("customer_id,source,type").is("deleted_at",null).order("ts",{ascending:false}).limit(4000);
  const badgeMap={};
  (tl.data||[]).forEach(e=>{ const b=badgeFor(e); if(!b) return; (badgeMap[e.customer_id]=badgeMap[e.customer_id]||new Set()).add(b); });
  custs.forEach(c=>{ const set=badgeMap[c.id]||new Set(); if(waSet.has(c.id)) set.add("WhatsApp"); c._badges=[...set]; c._convId=waSet.has(c.id)?1:null; c._msgs=null; c._tl=null; });
  STATE.customers=custs;
  fillFilterSelects(); renderList();
  const dl=deepLink(); if(dl) openCustomer(dl);
}
function wireFilters(){
  $("q").addEventListener("input",e=>{ FILTERS.q=e.target.value; renderList(); });
  $("fSource").addEventListener("change",e=>{ FILTERS.source=e.target.value; renderList(); });
  $("fRep").addEventListener("change",e=>{ FILTERS.rep=e.target.value; renderList(); });
  $("fStatus").addEventListener("change",e=>{ FILTERS.status=e.target.value; renderList(); });
  $("fPriority").addEventListener("change",e=>{ FILTERS.priority=e.target.value; renderList(); });
  document.querySelectorAll(".chip[data-flag]").forEach(ch=>ch.addEventListener("click",()=>{ const f=ch.dataset.flag; FILTERS[f]=!FILTERS[f]; ch.classList.toggle("on",FILTERS[f]); renderList(); }));
}
async function boot(){
  wireFilters();
  const demo=/[?&]demo=1/.test(location.search);
  if(demo || typeof supabase==="undefined"){ setMode(false); STATE.reps=DEMO_REPS; STATE.customers=DEMO_CUST; STATE.email="demo@surgamed.com"; fillFilterSelects(); showApp(); renderList(); const dl=deepLink(); if(dl) openCustomer(dl); return; }
  SB=supabase.createClient(SB_URL,SB_KEY); setMode(true);
  const { data:{ session } }=await SB.auth.getSession();
  if(!session){ showGate(`<h2>SurgaMed CRM — Managers only</h2><p class="who">Sign in with your SurgaMed Microsoft account.</p><p><button class="btn" id="si2">Sign in with Microsoft</button></p><p class="who">Or open <a href="?demo=1">demo mode</a>.</p>`);
    $("si2").addEventListener("click",()=>SB.auth.signInWithOAuth({provider:"azure",options:{redirectTo:location.href}})); return; }
  const email=(session.user.email||"").toLowerCase(); STATE.email=email; $("who").textContent=email;
  if(!MANAGERS.includes(email)){ showGate(`<h2>Managers only</h2><p class="who">${esc(email)} doesn't have access. Ask an admin.</p>`); return; }
  showApp(); await loadLive();
}
if(typeof document!=="undefined" && document.getElementById("app")) boot();
if(typeof window!=="undefined") window.__crm={statusLabel,nextAction,matchesFilters,dueSoon,naClass,statusName,badgeFor};
</script>
</body>
