<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SurgaMed · WhatsApp CRM</title>
<style>
  :root{--bg:#f4f6f9;--panel:#fff;--ink:#1d2733;--muted:#647387;--line:#e3e8ef;--blue:#185fa5;--blueS:#e8f1fb;--green:#1b9e6b;--greenS:#e6f6ee;--amber:#b7791f;--amberS:#fdf3e2;--red:#c0392b;--redS:#fdecea;--shadow:0 1px 3px rgba(16,24,40,.1)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header.top{background:var(--panel);border-bottom:1px solid var(--line);padding:10px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
  .brand{font-weight:700;font-size:15px;color:var(--blue)}
  .badge{font-size:11px;font-weight:600;border-radius:999px;padding:2px 10px}
  .badge.live{background:var(--greenS);color:var(--green)}
  .badge.demo{background:var(--amberS);color:var(--amber)}
  .spacer{flex:1}
  .who{color:var(--muted);font-size:12px}
  .btn{border:none;border-radius:7px;padding:7px 13px;font:13px inherit;font-weight:600;cursor:pointer;background:var(--blue);color:#fff}
  .gate{max-width:560px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;text-align:center;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 8px}
  .wrap{display:grid;grid-template-columns:340px 1fr;gap:0;height:calc(100vh - 49px)}
  .list{border-right:1px solid var(--line);background:#fff;overflow:auto}
  .lhead{padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
  .conv{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer}
  .conv:hover{background:#f8fafc}
  .conv.active{background:var(--blueS)}
  .conv .nm{font-weight:600}
  .conv .sub{color:var(--muted);font-size:11.5px;margin-top:2px}
  .pill{display:inline-block;font-size:10.5px;font-weight:600;border-radius:999px;padding:1px 8px;margin-top:4px}
  .pill.rep{background:var(--redS);color:var(--red)}
  .pill.cust{background:#eef1f5;color:var(--muted)}
  .pill.closed{background:var(--greenS);color:var(--green)}
  .pill.follow{background:var(--amberS);color:var(--amber)}
  .detail{overflow:auto;padding:18px 22px}
  .empty{color:var(--muted);text-align:center;margin-top:80px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:14px}
  .pname{font-size:18px;font-weight:700}
  .meta{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;color:var(--muted);font-size:12px}
  .meta b{color:var(--ink)}
  .na{font-weight:700;border-radius:7px;padding:3px 10px;display:inline-block}
  .na.reply{background:var(--redS);color:var(--red)} .na.follow{background:var(--amberS);color:var(--amber)} .na.wait{background:#eef1f5;color:var(--muted)} .na.none{background:var(--greenS);color:var(--green)}
  h3.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:18px 2px 8px}
  .msgs{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
  .msg{max-width:72%;padding:7px 11px;border-radius:12px;margin:6px 0;font-size:13px;clear:both}
  .msg.in{background:#eef2f6;float:left;border-bottom-left-radius:3px}
  .msg.out{background:var(--blueS);float:right;border-bottom-right-radius:3px}
  .msg .t{font-size:10px;color:var(--muted);margin-top:3px}
  .clear{clear:both}
  .tl{list-style:none;margin:0;padding:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  .tl li{padding:9px 14px;border-bottom:1px dashed var(--line)}
  .tl li:last-child{border-bottom:none}
  .tl .ty{font-weight:600}
  .tl .t{font-size:11px;color:var(--muted)}
  .test-banner{background:var(--amberS);color:var(--amber);border:1px solid #f0dcb3;border-radius:8px;padding:6px 12px;font-size:12px;margin:0 0 12px}
</style>
</head>
<body>
<header class="top">
  <span class="brand">SurgaMed · WhatsApp CRM</span>
  <span id="mode" class="badge demo">DEMO</span>
  <span class="spacer"></span>
  <span class="who" id="who"></span>
  <button class="btn" id="signin" style="display:none">Sign in with Microsoft</button>
</header>
<div id="gate" class="gate" style="display:none"></div>
<div id="app" class="wrap" style="display:none">
  <div class="list"><div class="lhead" id="lhead">WhatsApp conversations</div><div id="convs"></div></div>
  <div class="detail" id="detail"><div class="empty">Select a conversation to view the customer, messages and timeline.</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://ecjemcrpbzeocoiwslcu.supabase.co";
const SB_KEY="sb_publishable_GhYb1dkRQKdH5oimsnhaYA_A8QYT3Yq";
const MANAGERS=["mweinreb@surgamed.com","sgluck@surgamed.com","orders@surgamed.com"];

// ---------- pure helpers (unit-testable) ----------
function fmtAgo(t){ if(!t) return "—"; const d=new Date(t),h=(Date.now()-d.getTime())/3.6e6; if(h<1) return Math.max(1,Math.round(h*60))+"m ago"; if(h<24) return Math.round(h)+"h ago"; return Math.round(h/24)+"d ago"; }
function lastMsg(msgs){ return msgs&&msgs.length?msgs[msgs.length-1]:null; }
function statusLabel(conv,msgs){ if(conv.status==="closed") return "Closed"; const l=lastMsg(msgs); if(l&&l.direction==="in") return "Waiting on rep"; if(conv.follow_up_needed) return "Follow-up due"; return "Waiting on customer"; }
function statusClass(conv,msgs){ const s=statusLabel(conv,msgs); return s==="Closed"?"closed":s==="Waiting on rep"?"rep":s==="Follow-up due"?"follow":"cust"; }
function nextAction(conv,msgs){ if(conv.status==="closed") return "No action"; const l=lastMsg(msgs); if(l&&l.direction==="in") return "Reply to WhatsApp"; if(conv.follow_up_needed) return "Follow Up"; return "Waiting on Customer"; }
function naClass(a){ return a==="Reply to WhatsApp"?"reply":a==="Follow Up"?"follow":a==="No action"?"none":"wait"; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function detailHtml(c, conv, msgs, timeline, isTest){
  const na=nextAction(conv,msgs), st=statusLabel(conv,msgs);
  const lastAct=conv.last_message_at||c.last_contact_at;
  const banner=isTest?'<div class="test-banner">⚠ TEST customer — safe demo/QA row, not a real conversation.</div>':"";
  const mhtml=(msgs||[]).map(m=>`<div class="msg ${m.direction==="in"?"in":"out"}">${esc(m.text||"["+(m.media_type||"message")+"]")}<div class="t">${m.direction==="in"?"Customer":"Rep"} · ${fmtAgo(m.ts)}</div></div>`).join("")+'<div class="clear"></div>';
  const thtml=(timeline||[]).map(e=>`<li><span class="ty">${esc(e.title||e.type)}</span>${e.body?" — "+esc(e.body):""}<div class="t">${esc(e.type)} · ${esc(e.source||"")} · ${fmtAgo(e.ts)}</div></li>`).join("");
  return `${banner}
  <div class="pcard">
    <div class="pname">${esc(c.name||("Customer #"+c.id))}</div>
    <div class="meta">
      <span><b>Rep:</b> ${esc(c.assigned_rep||"Unassigned")}</span>
      <span><b>Phone:</b> ${esc(c.phone||"—")}</span>
      <span><b>Company:</b> ${esc(c.company||"—")}</span>
      <span><b>Email:</b> ${esc(c.email||"—")}</span>
      <span><b>Status:</b> ${esc(st)}</span>
      <span><b>Last activity:</b> ${fmtAgo(lastAct)}</span>
      <span><b>Next action:</b> <span class="na ${naClass(na)}">${esc(na)}</span></span>
    </div>
  </div>
  <h3 class="sec">Open WhatsApp conversation</h3>
  <div class="msgs">${mhtml||'<div class="empty" style="margin:20px">No messages.</div>'}</div>
  <h3 class="sec">Timeline</h3>
  <ul class="tl">${thtml||'<li>No timeline events.</li>'}</ul>`;
}
function convRowHtml(row){
  const c=row.customers||{}, st=statusLabel(row,row._msgs||[]);
  return `<div class="conv" data-cid="${c.id}"><div class="nm">${esc(c.name||("Customer #"+c.id))}</div><div class="sub">${esc(c.assigned_rep||"Unassigned")} · ${esc(c.company||c.phone||"")}</div><span class="pill ${statusClass(row,row._msgs||[])}">${esc(st)}</span> <span class="sub">${fmtAgo(row.last_message_at)}</span></div>`;
}

// ---------- demo data (safe; mirrors live schema shapes) ----------
const DEMO={
  convs:[{id:9001,status:"open",last_message_at:new Date(Date.now()-12*6e4).toISOString(),follow_up_needed:false,
    customers:{id:8001,name:"ZZ_WATEST — Dr. Demo Buyer",company:"Demo General Hospital",phone:"+19999990001",email:"demo.buyer@example.com",assigned_rep:"Deysi",last_contact_at:new Date(Date.now()-12*6e4).toISOString()},
    _msgs:[{direction:"in",text:"Hi, do you have the Hologic Selenia in stock?",ts:new Date(Date.now()-40*6e4).toISOString()},
           {direction:"out",text:"Yes — sending you the quote now.",ts:new Date(Date.now()-30*6e4).toISOString()},
           {direction:"in",text:"Great, what's the lead time?",ts:new Date(Date.now()-12*6e4).toISOString()}],
    _tl:[{type:"customer_created",source:"whatsapp",title:"Customer created from WhatsApp",ts:new Date(Date.now()-41*6e4).toISOString()},
         {type:"whatsapp_in",source:"whatsapp",title:"WhatsApp from Dr. Demo Buyer",body:"Hi, do you have…",ts:new Date(Date.now()-40*6e4).toISOString()},
         {type:"note",source:"slack",title:"Assigned to Deysi via Slack",ts:new Date(Date.now()-35*6e4).toISOString()}]}]
};

// ---------- runtime ----------
const $=id=>document.getElementById(id);
let SB=null, STATE={convs:[]};
function setMode(live){ const m=$("mode"); m.textContent=live?"LIVE":"DEMO"; m.className="badge "+(live?"live":"demo"); }
function showApp(){ $("gate").style.display="none"; $("app").style.display="grid"; }
function showGate(html){ $("app").style.display="none"; $("gate").style.display="block"; $("gate").innerHTML=html; }

function renderList(){
  $("convs").innerHTML=STATE.convs.map(convRowHtml).join("")||'<div class="empty" style="margin:30px">No WhatsApp conversations yet.</div>';
  document.querySelectorAll(".conv").forEach(el=>el.addEventListener("click",()=>openCustomer(Number(el.dataset.cid))));
}
async function openCustomer(cid){
  document.querySelectorAll(".conv").forEach(e=>e.classList.toggle("active",Number(e.dataset.cid)===cid));
  const row=STATE.convs.find(r=>(r.customers||{}).id===cid); if(!row) return;
  let msgs=row._msgs, tl=row._tl;
  if(SB){ // live fetch
    const m=await SB.from("messages").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts");
    const t=await SB.from("timeline_events").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts",{ascending:false});
    msgs=m.data||[]; tl=t.data||[]; row._msgs=msgs;
  }
  const isTest=/ZZ_WATEST/i.test(row.customers.name||"");
  $("detail").innerHTML=detailHtml(row.customers,row,msgs,tl,isTest);
}
function deepLinkCustomer(){ const m=(location.hash||"").match(/customer=(\d+)/); return m?Number(m[1]):null; }

async function loadLive(){
  const r=await SB.from("wa_conversations")
    .select("id,status,last_message_at,unread_count,follow_up_needed,customers(id,name,company,phone,email,assigned_rep,last_contact_at)")
    .is("deleted_at",null).order("last_message_at",{ascending:false});
  STATE.convs=r.data||[];
  renderList();
  const dl=deepLinkCustomer(); if(dl) openCustomer(dl);
}
async function boot(){
  const demo=/[?&]demo=1/.test(location.search);
  if(demo || typeof supabase==="undefined"){ setMode(false); STATE.convs=DEMO.convs; showApp(); renderList(); const dl=deepLinkCustomer(); if(dl) openCustomer(dl); return; }
  SB=supabase.createClient(SB_URL,SB_KEY);
  setMode(true);
  const { data:{ session } }=await SB.auth.getSession();
  if(!session){ showGate(`<h2>WhatsApp CRM — Managers only</h2><p class="who">Sign in with your SurgaMed Microsoft account to view live WhatsApp conversations.</p><p><button class="btn" id="si2">Sign in with Microsoft</button></p><p class="who">Or open <a href="?demo=1">demo mode</a>.</p>`);
    $("si2").addEventListener("click",()=>SB.auth.signInWithOAuth({provider:"azure",options:{redirectTo:location.href}})); return; }
  const email=(session.user.email||"").toLowerCase();
  $("who").textContent=email;
  if(!MANAGERS.includes(email)){ showGate(`<h2>Managers only</h2><p class="who">${esc(email)} doesn't have access to the WhatsApp CRM. Ask an admin.</p>`); return; }
  showApp(); await loadLive();
}
if(typeof document!=="undefined" && document.getElementById("app")) boot();
</script>
</body>
</html>
