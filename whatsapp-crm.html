<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SurgaMed · CRM</title>
<style>
  :root{--bg:#f4f6f9;--panel:#fff;--ink:#1d2733;--muted:#647387;--line:#e3e8ef;--blue:#185fa5;--blueS:#e8f1fb;--green:#1b9e6b;--greenS:#e6f6ee;--amber:#b7791f;--amberS:#fdf3e2;--red:#c0392b;--redS:#fdecea;--purple:#6b46c1;--purpleS:#efe9fb;--teal:#0f766e;--tealS:#d9f2ee;--shadow:0 1px 3px rgba(16,24,40,.1)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header.top{background:var(--panel);border-bottom:1px solid var(--line);padding:9px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
  .brand{font-weight:700;font-size:15px;color:var(--blue)}
  .badge{font-size:11px;font-weight:600;border-radius:999px;padding:2px 10px}
  .badge.live{background:var(--greenS);color:var(--green)}
  .badge.demo{background:var(--amberS);color:var(--amber)}
  .spacer{flex:1}
  .who{color:var(--muted);font-size:12px}
  .btn{border:none;border-radius:7px;padding:7px 13px;font:13px inherit;font-weight:600;cursor:pointer;background:var(--blue);color:#fff}
  .btn.sm{padding:4px 9px;font-size:12px}
  .btn.ghost{background:#fff;color:var(--blue);border:1px solid var(--line)}
  .btn.ghost.on{background:var(--blueS);border-color:var(--blue)}
  .gate{max-width:560px;margin:60px auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;text-align:center;box-shadow:var(--shadow)}
  .gate h2{margin:0 0 8px}
  .wrap{display:grid;grid-template-columns:380px 1fr;gap:0;height:calc(100vh - 48px)}
  .list{border-right:1px solid var(--line);background:#fff;overflow:auto;display:flex;flex-direction:column}
  .filters{padding:9px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5}
  .filters input[type=search]{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font:13px inherit;margin-bottom:7px}
  .frow{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .frow select{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font:11.5px inherit;background:#fff;color:var(--ink)}
  .chip{font-size:11px;font-weight:600;border:1px solid var(--line);border-radius:999px;padding:3px 9px;cursor:pointer;background:#fff;color:var(--muted);user-select:none}
  .chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .lcount{padding:6px 13px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line)}
  .rows{flex:1}
  .row{padding:10px 13px;border-bottom:1px solid var(--line);cursor:pointer}
  .row:hover{background:#f8fafc}
  .row.active{background:var(--blueS)}
  .row .nm{font-weight:600;display:flex;align-items:center;gap:6px}
  .row .sub{color:var(--muted);font-size:11.5px;margin-top:2px}
  .row .r2{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
  .src{display:inline-block;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px;letter-spacing:.2px}
  .src.WhatsApp{background:var(--greenS);color:var(--green)} .src.Email{background:var(--blueS);color:var(--blue)}
  .src.DOTmed{background:var(--purpleS);color:var(--purple)} .src.Shipping{background:var(--amberS);color:var(--amber)} .src.PayPal{background:var(--tealS);color:var(--teal)}
  .pill{display:inline-block;font-size:10.5px;font-weight:600;border-radius:999px;padding:1px 8px}
  .pill.follow{background:var(--amberS);color:var(--amber)}
  .pill.new{background:var(--blueS);color:var(--blue)} .pill.in_progress{background:#eaf2ff;color:#2563eb}
  .pill.quoted{background:var(--purpleS);color:var(--purple)} .pill.awaiting_customer{background:#eef1f5;color:var(--muted)}
  .pill.won{background:var(--greenS);color:var(--green)} .pill.lost{background:var(--redS);color:var(--red)} .pill.closed{background:var(--greenS);color:var(--green)}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.urgent{background:var(--red)} .dot.high{background:var(--amber)} .dot.normal{background:#9aa6b5} .dot.low{background:#cbd5e1}
  .star{color:#d8a800;font-weight:700} .flagx{color:var(--red);font-weight:700}
  .shipb{display:inline-block;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px}
  .detail{overflow:auto;padding:16px 20px}
  .empty{color:var(--muted);text-align:center;margin-top:80px}
  .pcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:13px}
  .pname{font-size:18px;font-weight:700;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .iconbtn{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:7px;padding:3px 8px;font-size:12px;font-weight:600;color:var(--muted)}
  .iconbtn.on.vip{background:#fff7df;color:#b8860b;border-color:#ecd98a}
  .iconbtn.on.rev{background:var(--redS);color:var(--red);border-color:#f0b6b6}
  .meta{display:flex;flex-wrap:wrap;gap:13px;margin-top:9px;color:var(--muted);font-size:12px}
  .meta b{color:var(--ink)}
  .ctrls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:4px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px}
  .field select,.field input{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font:13px inherit;background:#fff;color:var(--ink)}
  .na{font-weight:700;border-radius:7px;padding:3px 10px;display:inline-block}
  .na.reply{background:var(--redS);color:var(--red)} .na.follow{background:var(--amberS);color:var(--amber)} .na.wait{background:#eef1f5;color:var(--muted)} .na.none{background:var(--greenS);color:var(--green)}
  h3.sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 2px 8px;display:flex;align-items:center;gap:8px}
  .msgs{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
  .msg{max-width:72%;padding:7px 11px;border-radius:12px;margin:6px 0;font-size:13px;clear:both}
  .msg.in{background:#eef2f6;float:left;border-bottom-left-radius:3px}
  .msg.out{background:var(--blueS);float:right;border-bottom-right-radius:3px}
  .msg .t{font-size:10px;color:var(--muted);margin-top:3px}
  .clear{clear:both}
  .notes{background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:10px 12px}
  .note{padding:7px 0;border-bottom:1px dashed var(--line)} .note:last-child{border-bottom:none}
  .note .who{font-weight:600;color:var(--ink)}
  .noteadd{display:flex;gap:7px;margin-top:9px} .noteadd input{flex:1;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font:13px inherit}
  .tl{list-style:none;margin:0;padding:0;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  .tl li{padding:8px 13px;border-bottom:1px dashed var(--line);display:flex;gap:9px} .tl li:last-child{border-bottom:none}
  .tl .ic{font-size:14px;width:18px;text-align:center} .tl .ty{font-weight:600} .tl .t{font-size:11px;color:var(--muted)}
  .test-banner{background:var(--amberS);color:var(--amber);border:1px solid #f0dcb3;border-radius:8px;padding:6px 12px;font-size:12px;margin:0 0 12px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1d2733;color:#fff;padding:8px 16px;border-radius:8px;font-size:12.5px;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .2s;z-index:50}
  .toast.show{opacity:1}
  .phtab{width:100%;border-collapse:collapse;font-size:12px}
  .phtab th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);padding:5px 7px}
  .phtab td{border-bottom:1px solid var(--line);padding:6px 7px;vertical-align:top}
  .phtab tr:last-child td{border-bottom:none}
  .nowrap{white-space:nowrap}
  .emlink{color:var(--blue);text-decoration:none;font-weight:600}
  .emlink:hover{text-decoration:underline}
  .lsub{color:var(--muted);font-size:11px;margin-top:2px}
  .bodytext{white-space:pre-wrap;word-break:break-word;font:12px/1.5 inherit;background:#f8fafc;border:1px solid var(--line);border-radius:7px;padding:8px}
  .statusbadge{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .compose{margin-top:9px}
  .compose input,.compose textarea{width:100%;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font:13px inherit;margin-bottom:6px}
  .compose textarea{min-height:74px;resize:vertical}
  .compose .crow{display:flex;align-items:center;gap:10px}
  .sendmsg{font-size:12px}
  .ws{padding:16px 20px;overflow:auto;height:calc(100vh - 48px)}
  .ws-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:14px}
  .ws-kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow)}
  .ws-kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .ws-kpi .val{font-size:24px;font-weight:700;margin-top:3px}
  .ws-kpi.blue .val{color:var(--blue)} .ws-kpi.amber .val{color:var(--amber)} .ws-kpi.green .val{color:var(--green)} .ws-kpi.red .val{color:var(--red)}
  .ws-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:880px){.ws-grid{grid-template-columns:1fr}}
  .ws-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;box-shadow:var(--shadow)}
  .ws-card h3{margin:0 0 10px;font-size:13px}
  .ws-stage{display:flex;align-items:center;gap:9px;margin:6px 0;cursor:pointer}
  .ws-stage .nm{width:120px;font-size:12px}
  .ws-stage .bar{flex:1;background:#eef1f5;border-radius:999px;height:9px;overflow:hidden}
  .ws-stage .bar i{display:block;height:100%}
  .ws-stage .ct{width:34px;text-align:right;font-weight:700;font-size:12px}
  .ws-reptab{width:100%;border-collapse:collapse;font-size:12px}
  .ws-reptab th{text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);padding:5px 6px}
  .ws-reptab td{border-bottom:1px solid var(--line);padding:6px;cursor:pointer}
  .ws-reptab tr:hover td{background:#f8fafc}
  .ws-cap{color:var(--muted);font-size:11px;margin-top:7px}
</style>
</head>
<body>

<div id="ws" class="ws" style="display:none"></div>
