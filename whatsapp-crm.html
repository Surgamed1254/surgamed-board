function setMode(live){ const m=$("mode"); STATE.live=live; m.textContent=live?"LIVE":"DEMO"; m.className="badge "+(live?"live":"demo"); }
function showApp(){ $("gate").style.display="none"; $("app").style.display=WSVIEW?"none":"grid"; $("ws").style.display=WSVIEW?"block":"none"; $("wsToggle").style.display=""; $("refreshBtn").style.display=""; }
function showGate(html){ $("app").style.display="none"; $("ws").style.display="none"; $("wsToggle").style.display="none"; $("refreshBtn").style.display="none"; $("gate").style.display="block"; $("gate").innerHTML=html; }
function toast(t){ const e=$("toast"); e.textContent=t; e.classList.add("show"); clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove("show"),1900); }
async function freshToken(){ try{ const {data:{session}}=await SB.auth.getSession(); return session?session.access_token:""; }catch(e){ return ""; } }

function fillFilterSelects(){
  $("fStatus").innerHTML='<option value="">Any status</option>'+STATUSES.map(s=>`<option value="${s[0]}">${s[1]}</option>`).join("");
  $("fPriority").innerHTML='<option value="">Any priority</option>'+PRIORITIES.map(p=>`<option value="${p[0]}">${p[1]}</option>`).join("");
  $("fRep").innerHTML='<option value="">All reps</option><option value="__none">Unassigned</option>'+STATE.reps.map(r=>`<option>${esc(r.name)}</option>`).join("");
}
function badgesHtml(b){ return (b||[]).map(x=>`<span class="src ${x}">${x}</span>`).join(" "); }
function rowHtml(cu){
  const vip=cu.vip?'<span class="star" title="VIP">★</span>':"", rev=cu.review_flag?'<span class="flagx" title="Review">⚑</span>':"";
  const due=dueSoon(cu)?'<span class="pill follow">⏰ '+fmtDate(cu.follow_up_date)+'</span>':"";
  return `<div class="row" data-cid="${cu.id}">
    <div class="nm">${esc(dispName(cu))} ${vip} ${rev}</div>
    <div class="sub">${esc(cu.assigned_rep||"Unassigned")} · ${esc(cu.company||cu.email||cu.phone||"")}</div>
    <div class="r2">${badgesHtml(cu._badges)} <span class="dot ${cu.priority||'normal'}" title="Priority"></span><span class="pill ${statusClass(cu)}">${esc(statusLabel(cu))}</span> ${due} <span class="sub">${fmtAgo(cu.last_contact_at)}</span></div>
  </div>`;
}
function renderList(){
  const rows=STATE.customers.filter(c=>matchesFilters(c,FILTERS));
  $("rows").innerHTML=rows.map(rowHtml).join("")||'<div class="empty" style="margin:30px">No customers match.</div>';
  $("lcount").textContent=rows.length+" of "+STATE.customers.length+" customers";
  document.querySelectorAll(".row").forEach(el=>{ el.classList.toggle("active",Number(el.dataset.cid)===OPEN); el.addEventListener("click",()=>openCustomer(Number(el.dataset.cid))); });
}

// ---------- email history (live from the shared mailbox function) ----------
function renderEmailList(items){
  if(!items||!items.length) return '<div class="t" style="color:var(--muted)">No emails found with this customer yet.</div>';
  let h='<table class="phtab"><thead><tr><th>Subject</th><th>Date</th><th>Sent By</th><th></th></tr></thead><tbody>';
  items.forEach((m,i)=>{
    const icon=m.dir==='out'?'✉️':'📨';
    const who=m.dir==='out'?('to '+esc((m.to&&m.to[0])||'')):('from '+esc(cleanName(m.fromName)||m.from||''));
    const sentBy=m.dir==='out'?('<b>'+esc(m.sentBy||'SurgaMed')+'</b>'):'<span style="color:var(--muted)">customer</span>';
    const d=new Date(m.date), ds=isNaN(d.getTime())?String(m.date||'').slice(0,16):d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    h+='<tr><td><a href="#" class="emlink" data-ei="'+i+'" data-id="'+esc(m.id||'')+'" data-mbx="'+esc(m.mailbox||'')+'">'+icon+' '+esc(m.subject||'(no subject)')+'</a>'+(m.hasAttachments?' 📎':'')+'<div class="lsub">'+who+'</div></td>'+
       '<td class="nowrap">'+esc(ds)+'</td><td>'+sentBy+'</td>'+
       '<td>'+(m.webLink?'<a href="'+esc(m.webLink)+'" target="_blank" rel="noopener" title="Open in Outlook">↗</a>':'')+'</td></tr>';
    h+='<tr id="emd'+i+'" style="display:none"><td colspan="4"><div id="emw'+i+'"></div></td></tr>';
  });
  return h+'</tbody></table>';
}
async function fetchMessage(id,mbx){ const u=FN_URL+"?message="+encodeURIComponent(id)+(mbx?("&mbx="+encodeURIComponent(mbx)):""); const r=await fetch(u,{headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY}}); if(!r.ok) throw new Error("Server "+r.status); return await r.json(); }
async function toggleEmail(i,id,mbx){
  const det=$("emd"+i), wrap=$("emw"+i); if(!det) return;
  if(det.style.display!=="none"){ det.style.display="none"; return; }
  det.style.display=""; if(wrap.dataset.loaded) return;
  wrap.innerHTML='<div class="t" style="padding:6px 0">Loading email…</div>';
  try{ const m=await fetchMessage(id,mbx); const text=htmlToText((m&&m.body&&m.body.content)||(m&&m.summary)||""); wrap.innerHTML='<pre class="bodytext">'+linkify(text||"(no text content)")+'</pre>'; wrap.dataset.loaded="1"; }
  catch(e){ wrap.innerHTML='<div class="t" style="color:var(--red)">Couldn’t open this email: '+esc(String(e.message||e))+'</div>'; }
}
async function loadEmailThread(cu){
  const box=$("emailBox"); if(!box) return;
  if(!STATE.live){ box.innerHTML=renderEmailList(cu._emails||[]); box.onclick=null; return; }
  const email=(cu.email||"").trim();
  if(!email){ box.innerHTML='<div class="t" style="color:var(--muted)">No email on file to look up.</div>'; return; }
  box.innerHTML='<div class="t">Loading email history…</div>';
  try{
    const r=await fetch(FN_URL+"?thread="+encodeURIComponent(email),{headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY}});
    const d=await r.json(); if(!r.ok||d.error) throw new Error(d.error||("HTTP "+r.status));
    box.innerHTML=renderEmailList(d.items);
    box.onclick=function(e){ const a=e.target.closest(".emlink"); if(!a)return; e.preventDefault(); toggleEmail(a.dataset.ei,a.dataset.id,a.dataset.mbx); };
  }catch(e){ box.innerHTML='<div class="t" style="color:var(--red)">Couldn’t load emails: '+esc(String(e.message||e))+'</div>'; }
}
async function sendReply(cu){
  const ta=$("composeBody"), msg=$("sendMsg"), btn=$("sendBtn"); if(!ta) return;
  const text=(ta.value||"").trim(); if(!text){ ta.focus(); return; }
  const to=(cu.email||"").trim(); if(!to){ msg.style.color="var(--red)"; msg.textContent="No customer email to reply to."; return; }
  btn.disabled=true; msg.style.color="var(--muted)"; msg.textContent="Sending…";
  try{
    if(!STATE.live){ await new Promise(r=>setTimeout(r,500)); ta.value=""; msg.style.color="var(--green)"; msg.textContent="Sent ✓ (demo)"; btn.disabled=false; return; }
    const subj=((document.getElementById("composeSubject")||{}).value||"").trim()||("Re: SurgaMed");
    const rep=cu.assigned_rep||((STATE.email||"").split("@")[0]);
    const payload={action:"send",rep,text,to,subject:subj,from:""};
    const r=await fetch(FN_URL,{method:"POST",headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY,"content-type":"application/json"},body:JSON.stringify(payload)});
    const d=await r.json(); if(!r.ok||d.error) throw new Error(d.error||("HTTP "+r.status));
    try{ await SB.from("contacts").insert({customer_email:to.toLowerCase(),customer_name:cu.name||null,rep,rep_email:STATE.email||null,channel:"email",direction:"out",subject:subj,message_id:"crm-"+Date.now()}); }catch(_){}
    ta.value=""; msg.style.color="var(--green)"; msg.textContent="Sent ✓"; setTimeout(()=>loadEmailThread(cu),1300);
  }catch(e){ msg.style.color="var(--red)"; msg.textContent="Couldn’t send: "+String(e.message||e); }
  btn.disabled=false;
}

// ---------- shipping & tracking ----------
function renderShipping(list){
  if(!list||!list.length) return '<div class="t" style="color:var(--muted)">No matching ShipStation shipment found for this customer yet.</div>';
  const COL={shipped:'#1d7a3f',delivered:'#1d7a3f',awaiting_shipment:'#9a5b14',label_created:'#9a5b14',on_hold:'#9a5b14',cancelled:'#c0392b',voided:'#c0392b'};
  let h='<table class="phtab"><thead><tr><th>Status</th><th>Carrier</th><th>Tracking</th><th>Ship date</th></tr></thead><tbody>';
  list.forEach(s=>{
    const stt=(s.status||'').replace(/_/g,' ');
    const badge='<span class="statusbadge" style="background:'+(COL[s.status]||'#5a6b7b')+'"></span>'+esc(stt||'—');
    const trk=s.tracking?('<a href="'+esc(s.trackingUrl||'#')+'" target="_blank" rel="noopener">'+esc(s.tracking)+'</a>'):'<span style="color:var(--muted)">not shipped yet</span>';
    h+='<tr><td>'+badge+'</td><td>'+esc(s.carrier||'')+'</td><td>'+trk+'</td><td class="nowrap">'+esc(String(s.shipDate||'').slice(0,10))+'</td></tr>';
  });
  return h+'</tbody></table>';
}
async function loadShipping(cu){
  const box=$("shipBox"); if(!box) return;
  if(!STATE.live){ box.innerHTML=renderShipping(cu._ship||[]); return; }
  try{
    const u=FN_URL+"?shipstation=1&email="+encodeURIComponent(cu.email||"")+"&name="+encodeURIComponent(cu.name||"");
    const r=await fetch(u,{headers:{Authorization:"Bearer "+(await freshToken()),apikey:SB_KEY}});
    const d=await r.json(); if(d.error){ box.innerHTML='<div class="t" style="color:var(--muted)">'+esc(d.error)+'</div>'; return; }
    box.innerHTML=renderShipping(d.shipments||[]);
  }catch(e){ box.innerHTML='<div class="t" style="color:var(--red)">Couldn’t load tracking: '+esc(String(e.message||e))+'</div>'; }
}

// ---------- purchase / order history ----------
function renderPurchases(rows){
  if(!rows||!rows.length) return '<div class="t" style="color:var(--muted)">No past orders found for this customer.</div>';
  let h='<table class="phtab"><thead><tr><th>Date</th><th>Item</th><th>Source</th><th>Price</th></tr></thead><tbody>';
  rows.forEach(p=>{ const src=p.account==="ShortDated Surgical"?"ShortDated":(p.account||"");
    h+='<tr><td class="nowrap">'+esc(String(p.order_date||'').slice(0,10))+'</td><td>'+esc(p.item||'')+'</td><td>'+esc(src)+'</td><td class="nowrap">'+(p.price!=null?fmtMoney(p.price):'')+'</td></tr>'; });
  return h+'</tbody></table>';
}
async function loadPurchases(cu){
  const box=$("purchBox"); if(!box) return;
  if(!STATE.live){ box.innerHTML=renderPurchases(cu._purch||[]); return; }
  const email=(cu.email||"").toLowerCase().trim();
  if(!email){ box.innerHTML='<div class="t" style="color:var(--muted)">No email on file to look up orders.</div>'; return; }
  try{
    const {data}=await SB.from("purchases").select("account,order_date,item,price,listing").ilike("customer_email",email).order("order_date",{ascending:false}).limit(300);
    box.innerHTML=renderPurchases(data||[]);
  }catch(e){ box.innerHTML='<div class="t" style="color:var(--red)">Couldn’t load orders: '+esc(String(e.message||e))+'</div>'; }
}

function detailHtml(cu, msgs, timeline, isTest){
  const na=nextAction(cu,msgs);
  const banner=isTest?'<div class="test-banner">⚠ TEST customer — safe demo/QA row.</div>':"";
  const repOpts='<option value="">Unassigned</option>'+STATE.reps.map(r=>`<option value="${r.id}" ${cu.assigned_rep===r.name?"selected":""}>${esc(r.name)}</option>`).join("");
  const statusOpts=STATUSES.map(s=>`<option value="${s[0]}" ${(cu.manager_status||"new")===s[0]?"selected":""}>${s[1]}</option>`).join("");
  const prioOpts=PRIORITIES.map(p=>`<option value="${p[0]}" ${(cu.priority||"normal")===p[0]?"selected":""}>${p[1]}</option>`).join("");
  const mhtml=(msgs||[]).map(m=>`<div class="msg ${m.direction==="in"?"in":"out"}">${esc(m.text||"["+(m.media_type||"message")+"]")}<div class="t">${m.direction==="in"?"Customer":"Rep"} · ${fmtAgo(m.ts)}</div></div>`).join("")+'<div class="clear"></div>';
  const notes=(timeline||[]).filter(e=>e.type==="note");
  const nhtml=notes.map(e=>`<div class="note"><span class="who">${esc((e.rep||"manager").split("@")[0])}</span> · <span class="t">${fmtAgo(e.ts)}</span><div>${esc(e.title||"")}${e.body?" — "+esc(e.body):""}</div></div>`).join("")||'<div class="t">No internal notes yet.</div>';
  const thtml=(timeline||[]).map(e=>`<li><span class="ic">${TLICON[e.type]||"•"}</span><div><span class="ty">${esc(e.title||e.type)}</span>${e.body?" — "+esc(e.body):""}<div class="t">${esc(e.type)} · ${esc(e.source||"")} · ${fmtAgo(e.ts)}</div></div></li>`).join("");
  const convSection = cu._convId
    ? `<h3 class="sec">WhatsApp conversation</h3><div class="msgs">${mhtml||'<div class="t">No messages.</div>'}</div>`
    : `<h3 class="sec">WhatsApp conversation</h3><div class="msgs"><div class="t">No WhatsApp conversation yet — this customer came from ${esc((cu._badges||["email"]).join(", "))}.</div></div>`;
  const composeBox=`<div class="compose">
      <input type="text" id="composeSubject" placeholder="Subject (optional)"/>
      <textarea id="composeBody" placeholder="Write a reply… sends from SurgaMed, attributed to ${esc(cu.assigned_rep||'you')}, and appears in the history above."></textarea>
      <div class="crow"><button class="btn sm" id="sendBtn">Send email</button><span class="sendmsg" id="sendMsg"></span></div>
    </div>`;
  return `${banner}
  <div class="pcard">
    <div class="pname">${esc(dispName(cu))} ${badgesHtml(cu._badges)}
      <span class="iconbtn vip ${cu.vip?"on":""}" data-act="vip">★ VIP</span>
      <span class="iconbtn rev ${cu.review_flag?"on":""}" data-act="review">⚑ Review</span>
    </div>
    <div class="meta">
      <span><b>Email:</b> ${esc(cu.email||"—")}</span><span><b>Phone:</b> ${esc(cu.phone||"—")}</span>
      <span><b>Company:</b> ${esc(cu.company||"—")}</span><span><b>Country:</b> ${esc(cu.country||"—")}</span>
      <span><b>Last activity:</b> ${fmtAgo(cu.last_contact_at)}</span>
    </div>
  </div>
  <div class="pcard"><div class="ctrls">
    <div class="field"><label>Assigned rep</label><select data-act="assign_rep">${repOpts}</select></div>

    <div class="field"><label>Priority</label><select data-act="set_priority">${prioOpts}</select></div>
    <div class="field"><label>Follow-up date</label><input type="date" data-act="set_follow_up" value="${cu.follow_up_date||""}"/></div>
    <div class="field"><label>Next action (auto: ${esc(na)})</label><input type="text" data-act="set_next_action" placeholder="Override…" value="${esc(cu.next_action_override||"")}"/></div>
    <div class="field"><label>Current next action</label><div><span class="na ${naClass(na)}">${esc(na)}</span></div></div>
  </div></div>
  <h3 class="sec">Email history</h3>
  <div class="msgs"><div id="emailBox"><div class="t">Loading…</div></div>${composeBox}</div>
  <h3 class="sec">Shipping &amp; tracking</h3>
  <div class="msgs" id="shipBox"><div class="t">Loading…</div></div>

  ${convSection}
  <h3 class="sec">Internal notes (managers only)</h3>
  <div class="notes"><div id="noteList">${nhtml}</div>
    <div class="noteadd"><input type="text" id="noteInput" placeholder="Add an internal note…"/><button class="btn sm" id="noteAdd">Add</button></div></div>

async function callFn(action,payload){
  const { data:{ session } }=await SB.auth.getSession();
  const r=await fetch(MANAGER_FN,{method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+(session&&session.access_token||"")},body:JSON.stringify({action,...payload})});
  const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||("HTTP "+r.status)); return j;
}
function localNote(cu,title,body){ (cu._tl=cu._tl||[]).unshift({type:"note",source:"manager",rep:(STATE.email||"demo"),title,body,ts:new Date().toISOString()}); }
async function mgrAction(cu,action,payload){
  try{
    if(STATE.live){ await callFn(action,{customer_id:cu.id,...payload}); }
    if(action==="assign_rep"){ const rep=STATE.reps.find(r=>r.id===payload.rep_id); cu.assigned_rep=rep?rep.name:""; localNote(cu,"Assigned to "+(rep?rep.name:"unassigned")); }
    if(action==="set_status"){ cu.manager_status=payload.manager_status; localNote(cu,"Status → "+statusName(payload.manager_status)); }
    if(action==="set_priority"){ cu.priority=payload.priority; localNote(cu,"Priority → "+payload.priority); }
    if(action==="set_follow_up"){ cu.follow_up_date=payload.follow_up_date||null; localNote(cu,payload.follow_up_date?"Follow-up set for "+payload.follow_up_date:"Follow-up cleared"); }
    if(action==="set_next_action"){ cu.next_action_override=payload.next_action_override||null; localNote(cu,payload.next_action_override?"Next action: "+payload.next_action_override:"Next action cleared (auto)"); }
    if(action==="toggle_vip"){ cu.vip=payload.vip; localNote(cu,payload.vip?"Marked VIP":"VIP removed"); }
    if(action==="toggle_review"){ cu.review_flag=payload.review_flag; localNote(cu,payload.review_flag?"Flagged for review":"Review flag cleared"); }
    if(action==="add_note"){ localNote(cu,"Internal note",payload.body); }
    toast(STATE.live?"Saved":"Saved (demo)"); renderList(); openCustomer(cu.id,true);
  }catch(e){ toast("⚠ "+e.message); }
}
function wireDetail(cu){
  document.querySelectorAll('[data-act]').forEach(el=>{
    const a=el.dataset.act;
    if(el.tagName==="SELECT"){ el.addEventListener("change",()=>{
      if(a==="assign_rep") mgrAction(cu,"assign_rep",{rep_id:Number(el.value)||null});
      if(a==="set_status") mgrAction(cu,"set_status",{manager_status:el.value});
      if(a==="set_priority") mgrAction(cu,"set_priority",{priority:el.value});
    }); }
    else if(el.tagName==="INPUT" && a==="set_follow_up"){ el.addEventListener("change",()=>mgrAction(cu,"set_follow_up",{follow_up_date:el.value||null})); }
    else if(el.tagName==="INPUT" && a==="set_next_action"){ el.addEventListener("change",()=>mgrAction(cu,"set_next_action",{next_action_override:el.value||null})); }
    else if(a==="vip"){ el.addEventListener("click",()=>mgrAction(cu,"toggle_vip",{vip:!cu.vip})); }
    else if(a==="review"){ el.addEventListener("click",()=>mgrAction(cu,"toggle_review",{review_flag:!cu.review_flag})); }
  });
  const add=$("noteAdd"), inp=$("noteInput");
  if(add) add.addEventListener("click",()=>{ const v=(inp.value||"").trim(); if(!v) return; inp.value=""; mgrAction(cu,"add_note",{body:v}); });
  if(inp) inp.addEventListener("keydown",e=>{ if(e.key==="Enter") add.click(); });
  const sb2=$("sendBtn"); if(sb2) sb2.addEventListener("click",()=>sendReply(cu));
}

async function openCustomer(cid,keep){
  OPEN=cid;
  document.querySelectorAll(".row").forEach(e=>e.classList.toggle("active",Number(e.dataset.cid)===cid));
  const cu=STATE.customers.find(c=>c.id===cid); if(!cu) return;
  let msgs=cu._msgs, tl=cu._tl;
  if(SB && STATE.live){
    if(cu._convId!==null){ const m=await SB.from("messages").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts"); msgs=m.data||[]; } else msgs=[];
    const t=await SB.from("timeline_events").select("*").eq("customer_id",cid).is("deleted_at",null).order("ts",{ascending:false}); tl=t.data||[];
    cu._msgs=msgs; cu._tl=tl;
  }
  const isTest=/ZZ_WATEST/i.test(cu.name||"");
  $("detail").innerHTML=detailHtml(cu,msgs,tl,isTest); wireDetail(cu);
  // load the heavy sections (email / shipping / orders)
  loadEmailThread(cu); loadShipping(cu); loadPurchases(cu);
}
function deepLink(){ const m=(location.hash||"").match(/customer=(\d+)/); return m?Number(m[1]):null; }

// ---------- manager KPI workspace ----------
function renderWorkspace(){
  const cs=STATE.customers;
  const byStatus={}; STATUSES.forEach(s=>byStatus[s[0]]=0);
  cs.forEach(c=>{ const s=c.manager_status||"new"; byStatus[s]=(byStatus[s]||0)+1; });
  const total=cs.length, won=(byStatus.won||0)+(byStatus.closed||0);
  const open=cs.filter(c=>!["won","lost","closed"].includes(c.manager_status)).length;
  const due=cs.filter(dueSoon).length, vip=cs.filter(c=>c.vip).length, review=cs.filter(c=>c.review_flag).length, unassigned=cs.filter(c=>!c.assigned_rep).length;
  const conv=total?Math.round(won/total*100):0;
  const kpi=(lab,val,cls)=>'<div class="ws-kpi'+(cls?' '+cls:'')+'"><div class="lab">'+lab+'</div><div class="val">'+val+'</div></div>';
  let html='<div class="ws-kpis">'+
    kpi('Customers',total)+kpi('Open',open,'blue')+kpi('Won',won,'green')+kpi('Conversion',conv+'%')+
    kpi('Due now',due,'amber')+kpi('Unassigned',unassigned,'red')+kpi('VIP',vip)+kpi('Flagged',review)+'</div>';
  const maxStage=Math.max(1,...STATUSES.map(s=>byStatus[s[0]]||0));
  let pipe='<div class="ws-card"><h3>Pipeline by stage</h3>';
  STATUSES.forEach(s=>{ const c=byStatus[s[0]]||0, w=Math.round(c/maxStage*100);
    pipe+='<div class="ws-stage" data-wsstage="'+s[0]+'" title="Filter to '+esc(s[1])+'"><span class="nm">'+esc(s[1])+'</span><span class="bar"><i style="width:'+w+'%;background:'+(STATUS_COLOR[s[0]]||'#185fa5')+'"></i></span><span class="ct">'+c+'</span></div>'; });
  pipe+='<div class="ws-cap">Click a stage to open that filtered list.</div></div>';
  const reps=STATE.reps.map(r=>{ const ls=cs.filter(c=>c.assigned_rep===r.name); return {r:r.name,total:ls.length,open:ls.filter(c=>!["won","lost","closed"].includes(c.manager_status)).length,won:ls.filter(c=>["won","closed"].includes(c.manager_status)).length,due:ls.filter(dueSoon).length}; });
  reps.sort((a,b)=>b.total-a.total);
  let rept='<div class="ws-card"><h3>Rep performance</h3><table class="ws-reptab"><thead><tr><th>Rep</th><th>Customers</th><th>Open</th><th>Won</th><th>Due</th></tr></thead><tbody>';
  reps.forEach(p=>{ rept+='<tr data-wsrep="'+esc(p.r)+'" title="Filter to '+esc(p.r)+'"><td><b>'+esc(p.r)+'</b></td><td>'+p.total+'</td><td>'+p.open+'</td><td style="color:var(--green)">'+p.won+'</td><td style="color:var(--amber)">'+p.due+'</td></tr>'; });
  const un=cs.filter(c=>!c.assigned_rep).length; rept+='<tr data-wsrep="__none"><td><b>Unassigned</b></td><td>'+un+'</td><td>'+un+'</td><td>0</td><td>'+cs.filter(c=>!c.assigned_rep&&dueSoon(c)).length+'</td></tr>';
  rept+='</tbody></table><div class="ws-cap">Click a rep to open their filtered customer list.</div></div>';
  html+='<div class="ws-grid">'+pipe+rept+'</div>';
  $("ws").innerHTML=html;
  document.querySelectorAll('#ws [data-wsstage]').forEach(el=>el.onclick=()=>{ FILTERS.status=el.getAttribute('data-wsstage'); $("fStatus").value=FILTERS.status; setWsView(false); renderList(); });
  document.querySelectorAll('#ws [data-wsrep]').forEach(el=>el.onclick=()=>{ FILTERS.rep=el.getAttribute('data-wsrep'); $("fRep").value=FILTERS.rep; setWsView(false); renderList(); });
}
function setWsView(on){ WSVIEW=on; $("wsToggle").classList.toggle("on",on); $("wsToggle").textContent=on?"👥 Customers":"📊 Workspace"; if(on){ renderWorkspace(); } showApp(); }

async function loadLive(){
  const reps=await SB.from("reps").select("id,name").is("deleted_at",null).order("id"); STATE.reps=reps.data||[];
  const cr=await SB.from("customers")
    .select("id,name,company,phone,email,assigned_rep,vip,review_flag,country,preferred_language,last_contact_at,manager_status,priority,next_action_override,follow_up_date")
    .is("deleted_at",null).order("last_contact_at",{ascending:false,nullsFirst:false}).limit(500);
  const custs=cr.data||[];
  const conv=await SB.from("wa_conversations").select("customer_id").is("deleted_at",null);
  const waSet=new Set((conv.data||[]).map(x=>x.customer_id));
  const tl=await SB.from("timeline_events").select("customer_id,source,type").is("deleted_at",null).order("ts",{ascending:false}).limit(4000);
  const badgeMap={};
  (tl.data||[]).forEach(e=>{ const b=badgeFor(e); if(!b) return; (badgeMap[e.customer_id]=badgeMap[e.customer_id]||new Set()).add(b); });
  custs.forEach(c=>{ const set=badgeMap[c.id]||new Set(); if(waSet.has(c.id)) set.add("WhatsApp"); c._badges=[...set]; c._convId=waSet.has(c.id)?1:null; c._msgs=null; c._tl=null; });
  STATE.customers=custs;
  fillFilterSelects(); renderList(); if(WSVIEW) renderWorkspace();
  const dl=deepLink(); if(dl) openCustomer(dl);
}
function wireFilters(){
  $("q").addEventListener("input",e=>{ FILTERS.q=e.target.value; renderList(); });
  $("fSource").addEventListener("change",e=>{ FILTERS.source=e.target.value; renderList(); });
  $("fRep").addEventListener("change",e=>{ FILTERS.rep=e.target.value; renderList(); });
  $("fStatus").addEventListener("change",e=>{ FILTERS.status=e.target.value; renderList(); });
  $("fPriority").addEventListener("change",e=>{ FILTERS.priority=e.target.value; renderList(); });
  document.querySelectorAll(".chip[data-flag]").forEach(ch=>ch.addEventListener("click",()=>{ const f=ch.dataset.flag; FILTERS[f]=!FILTERS[f]; ch.classList.toggle("on",FILTERS[f]); renderList(); }));
  $("wsToggle").addEventListener("click",()=>setWsView(!WSVIEW));
  $("refreshBtn").addEventListener("click",async()=>{ if(STATE.live){ $("refreshBtn").textContent="↻ …"; await loadLive(); $("refreshBtn").textContent="↻ Refresh"; toast("Refreshed"); } });
}
async function boot(){
  wireFilters();
  const demo=/[?&]demo=1/.test(location.search);
  if(demo || typeof supabase==="undefined"){ setMode(false); STATE.reps=DEMO_REPS; STATE.customers=DEMO_CUST; STATE.email="demo@surgamed.com"; fillFilterSelects(); showApp(); renderList(); const dl=deepLink(); if(dl) openCustomer(dl); return; }
  SB=supabase.createClient(SB_URL,SB_KEY); setMode(true);
  const { data:{ session } }=await SB.auth.getSession();
  if(!session){ showGate(`<h2>SurgaMed CRM — Managers only</h2><p class="who">Sign in with your SurgaMed Microsoft account.</p><p><button class="btn" id="si2">Sign in with Microsoft</button></p><p class="who">Or open <a href="?demo=1">demo mode</a>.</p>`);
    $("si2").addEventListener("click",()=>SB.auth.signInWithOAuth({provider:"azure",options:{redirectTo:location.href}})); return; }
  const email=(session.user.email||"").toLowerCase(); STATE.email=email; $("who").textContent=email;
  if(!MANAGERS.includes(email)){ showGate(`<h2>Managers only</h2><p class="who">${esc(email)} doesn't have access. Ask an admin.</p>`); return; }
  showApp(); await loadLive();
}
if(typeof document!=="undefined" && document.getElementById("app")) boot();
if(typeof window!=="undefined") window.__crm={statusLabel,nextAction,matchesFilters,dueSoon,naClass,statusName,badgeFor,cleanName,dispName,renderEmailList,renderShipping,renderPurchases};
</script>
</body>
